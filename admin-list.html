<<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-btn.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design</a>
            <div id="admin-menu" class="hidden md:flex gap-6 text-sm font-semibold">
                <button onclick="switchTab('requests')" id="btn-requests" class="tab-btn active py-5">견적 내역</button>
                <button onclick="switchTab('qna')" id="btn-qna" class="tab-btn py-5 text-gray-500">Q&A 관리</button>
                <button onclick="switchTab('parts')" id="btn-parts" class="tab-btn py-5 text-gray-500">부품 관리</button>
                <button onclick="switchTab('archive')" id="btn-archive" class="tab-btn py-5 text-gray-500">자료실</button>
            </div>
        </div>
        <button id="logout-btn" onclick="logout()" class="hidden text-sm font-bold text-red-500">로그아웃</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto py-10 px-4">
    <section id="section-requests">
        <h2 class="text-2xl font-black mb-6 text-gray-800">최근 신청 내역</h2>
        <div id="request-container" class="space-y-4"></div>
    </section>

    <section id="section-qna" class="hidden">
        <h2 class="text-2xl font-black mb-6 text-gray-800">Q&A 질문 및 답변 관리</h2>
        <div id="admin-qna-list" class="space-y-6">
            </div>
    </section>

    <section id="section-parts" class="hidden">
        <h2 class="text-2xl font-black mb-6 text-gray-800">부품 재고 관리</h2>
        <div id="parts-admin-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section id="section-archive" class="hidden">
        <h2 class="text-2xl font-black mb-6 text-gray-800">자료실 관리</h2>
        <div id="archive-admin-list" class="space-y-2"></div>
    </section>
</main>

<div id="loginModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
        <h2 class="text-2xl font-black mb-6">관리자 인증</h2>
        <input type="password" id="adminPw" class="w-full p-4 bg-gray-50 rounded-2xl border-none mb-4 text-center focus:ring-2 focus:ring-blue-500 outline-none" placeholder="비밀번호 입력">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">로그인</button>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = { databaseURL: "https://well-design-ca7c4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // [핵심] 탭 전환 함수
    function switchTab(tabId) {
        // 모든 섹션 숨기기
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        // 모든 버튼 스타일 초기화
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'text-blue-600');
            b.classList.add('text-gray-500');
        });

        // 선택한 섹션 표시 및 버튼 활성화
        document.getElementById(`section-${tabId}`).classList.remove('hidden');
        document.getElementById(`btn-${tabId}`).classList.add('active', 'text-blue-600');
        document.getElementById(`btn-${tabId}`).classList.remove('text-gray-500');

        // Q&A 탭 클릭 시 데이터 로드
        if(tabId === 'qna') loadAdminQnA();
    }

    // [신규] Q&A 데이터 로드 및 렌더링
    function loadAdminQnA() {
        db.ref('qna').orderByChild('timestamp').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('admin-qna-list');
            if(!data) {
                container.innerHTML = "<p class='text-center py-20 text-gray-400 font-medium'>등록된 문의가 없습니다.</p>";
                return;
            }

            let html = "";
            const keys = Object.keys(data).reverse(); // 최신순

            keys.forEach(id => {
                const item = data[id];
                const date = new Date(item.timestamp).toLocaleString();
                const isCompleted = item.status === 'completed';

                html += `
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm transition-all hover:shadow-md">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[10px] font-black px-2 py-1 rounded-full ${isCompleted ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                                        ${isCompleted ? '답변완료' : '답변대기'}
                                    </span>
                                    ${item.isPrivate ? '<span class="text-xs text-red-500 font-bold">[비밀글]</span>' : ''}
                                    <span class="text-xs text-gray-400 font-medium">${item.author} | PW: ${item.pw} | ${date}</span>
                                </div>
                                <h3 class="text-xl font-bold text-gray-900">${item.title}</h3>
                            </div>
                            <button onclick="deleteQnA('${id}')" class="text-red-400 hover:text-red-600 text-xs font-bold transition-colors">삭제</button>
                        </div>
                        
                        <div class="bg-gray-50 p-5 rounded-2xl mb-6 text-sm text-gray-700 whitespace-pre-wrap border border-gray-100">
                            <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">Question</div>
                            ${item.content}
                        </div>

                        <div class="space-y-3">
                            <div class="text-[10px] font-bold text-blue-500 uppercase ml-1 tracking-widest">Answer</div>
                            <textarea id="ans-${id}" class="w-full h-32 p-4 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all" placeholder="답변을 입력해 주세요...">${item.answer || ''}</textarea>
                            <button onclick="submitAnswer('${id}')" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold text-sm hover:bg-blue-600 transition-all shadow-lg shadow-gray-100">
                                ${isCompleted ? '답변 수정하기' : '답변 등록하기'}
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    // 답변 제출 함수
    function submitAnswer(id) {
        const answer = document.getElementById(`ans-${id}`).value;
        if(!answer) return alert("답변 내용을 입력하세요.");

        db.ref(`qna/${id}`).update({
            answer: answer,
            status: "completed"
        }).then(() => alert("답변이 성공적으로 등록되었습니다."));
    }

    // Q&A 삭제 함수
    function deleteQnA(id) {
        if(confirm("이 문의글을 정말 삭제할까요?")) {
            db.ref(`qna/${id}`).remove().then(() => alert("삭제되었습니다."));
        }
    }

    // --- 기존 기능 유지 코드 ---

    function loadRequests() {
        db.ref('requests').orderByChild('timestamp').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('request-container');
            if(!data) { container.innerHTML = "<p class='text-gray-400 text-center py-20 font-medium'>신청 내역이 없습니다.</p>"; return; }

            let html = "";
            const keys = Object.keys(data).reverse();
            keys.forEach(key => {
                const req = data[key];
                const date = new Date(req.timestamp).toLocaleString();
                html += `
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black bg-blue-100 text-blue-600 px-2 py-1 rounded-full uppercase">${req.type || '견적신청'}</span>
                                <h3 class="text-lg font-bold mt-1">${req.userName || req.name} (${req.userPhone || req.phone})</h3>
                                <p class="text-xs text-gray-400 font-medium">${date}</p>
                            </div>
                            <button onclick="deleteRequest('${key}')" class="text-red-400 text-xs font-bold hover:underline">내역삭제</button>
                        </div>
                        <div class="text-sm text-gray-600 bg-gray-50 p-4 rounded-xl">
                            ${req.items ? Object.values(req.items).map(i => `${i.name} x${i.count}`).join(' / ') : '상품 정보 없음'}
                            <div class="mt-2 pt-2 border-t font-bold text-blue-600">합계: ${req.totalPrice}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    function deleteRequest(key) { if(confirm("삭제하시겠습니까?")) db.ref('requests').child(key).remove(); }

    function checkAdmin() {
        const pw = document.getElementById('adminPw').value;
        if(pw === "0927") {
            sessionStorage.setItem("adminLoggedIn", "true");
            location.reload();
        } else {
            alert("암호가 틀렸습니다.");
        }
    }

    function logout() {
        sessionStorage.removeItem("adminLoggedIn");
        location.href = "index.html";
    }

    window.onload = () => {
        const isLoggedIn = sessionStorage.getItem("adminLoggedIn") === "true";
        if (isLoggedIn) {
            document.getElementById('admin-menu').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            loadRequests(); 
        } else {
            document.getElementById('loginModal').classList.replace('hidden', 'flex');
        }
    };
</script>
</body>
</html>
