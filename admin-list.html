<section>

            <input type="text" id="usedImage" placeholder="이미지 URL" class="px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none text-sm">

        <button onclick="addUsedItem()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black hover:bg-green-700 transition-all">중고 품목 등록</button>
        
        <div id="usedProductList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-8 pt-8 border-t border-gray-50">

</section>
<section class="mt-12">
    <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-blue-600 rounded-full"></span> 견적 부품 DB 관리
    </h2>
    <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-sm">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
        <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">카테고리</label>
        <select id="partCategory" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold">
            <option>CPU</option><option>메인보드</option><option>메모리</option><option>그래픽카드</option>
            <option>SSD/HDD</option><option>케이스</option><option>파워</option><option>쿨러</option>

    </div>
    <div>
        <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">부품명</label>
        <input type="text" id="partName" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold">
    </div>
    <div>
        <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">판매 가격</label>
        <input type="number" id="partPrice" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold">
    </div>
    <div>
        <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">이미지 URL</label>

    </div>
    <div class="md:col-span-2">
        <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">상세 설명</label>
        <textarea id="partDesc" rows="4" class="w-full bg-gray-50 border-none rounded-3xl px-6 py-5 font-medium"></textarea>
    </div>
</div>
        <button onclick="addPartItem()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition-all">부품 데이터 등록</button>
        
        <div id="adminPartsList" class="mt-8 space-y-2 max-h-[400px] overflow-y-auto no-scrollbar"></div>
    </div>
</section>

    </main>

    <div id="loginModal" class="fixed inset-0 bg-gray-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-8 text-blue-600 uppercase italic">Admin Access</h2>
            <input type="password" id="adminPw" placeholder="Access Key" class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl mb-4 text-center text-xl font-bold outline-none">
            <button onclick="checkAdmin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg">관리자 로그인</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

let editingPartKey = null;

        // [복구] 1. 고객 견적/판매 신청 내역 로드 및 상세 부품 표시
        function loadRequests() {
            db.ref('requests').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('requestAdminList');
                const countText = document.getElementById('requestCount');

                if (!data) {
                    list.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 bg-white rounded-[32px] border border-gray-100">접수된 내역이 없습니다.</p>';
                    countText.innerText = "접수 0건";
                    return;
                }

                const keys = Object.keys(data).reverse();
                countText.innerText = `접수 ${keys.length}건`;

                list.innerHTML = keys.map(key => {
                    const req = data[key];
                    const date = new Date(req.timestamp).toLocaleString();
                    
                    // [부품 상세 리스트 생성]
                    let itemsHtml = '';
                    if (req.items) {
                        itemsHtml = Object.entries(req.items).map(([cat, item]) => `
                            <div class="flex justify-between items-center text-[11px] py-1 border-b border-gray-50 last:border-0">
                                <span class="text-gray-400 font-bold w-16 shrink-0">${cat}</span>
                                <span class="flex-1 text-gray-700 truncate px-2 font-medium">${item.name}</span>
                                <span class="text-blue-600 font-black shrink-0">${item.count}개</span>
                            </div>
                        `).join('');
                    } else {
                        itemsHtml = '<p class="text-gray-300 text-[11px] text-center py-2">부품 선택 정보가 없습니다.</p>';
                    }

                    return `
                        <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="px-2 py-0.5 bg-blue-600 text-[10px] font-bold text-white rounded mb-2 inline-block">${req.type || '견적 신청'}</span>
                                    <h3 class="text-xl font-black text-gray-800">${req.name}</h3>
                                    <p class="text-sm font-bold text-blue-500">${req.phone}</p>
                                </div>
                                <button onclick="deleteData('requests', '${key}')" class="text-gray-300 hover:text-red-500 text-sm">삭제</button>
                            </div>

                            <div class="bg-gray-50/50 p-4 rounded-2xl mb-4 border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-wider">Selected Parts Details</p>
                                <div class="space-y-0.5">
                                    ${itemsHtml}
                                </div>
                            </div>

                            <div class="space-y-2 px-1">
                                <div class="bg-blue-50/50 p-3 rounded-xl">
                                    <p class="text-[9px] font-bold text-blue-400 mb-1">고객 요청사항</p>
                                    <p class="text-[11px] text-gray-600 leading-snug">${req.memo || '내용 없음'}</p>
                                </div>
                                <div class="flex justify-between items-center pt-2">
                                    <span class="text-xs font-bold text-gray-400">최종 견적가</span>
                                    <span class="text-lg font-black text-gray-900">${req.totalPrice || '0원'}</span>
                                </div>
                            </div>
                            <p class="mt-4 text-[9px] text-gray-300 text-right font-medium italic">${date}</p>
                        </div>
                    `;
                }).join('');
            });
        }

        // [복구] 2. 자료실 등록 기능
        function addArchive() {
            const category = document.getElementById('arcCategory').value;
            const title = document.getElementById('arcTitle').value;
            const link = document.getElementById('arcLink').value;
            
            if(!title || !link) return alert("자료 제목과 다운로드 링크를 입력해주세요.");

            db.ref('archives').push({
                category,
                title,
                link,
                date: new Date().toISOString().split('T')[0]
            }).then(() => {
                alert("자료가 등록되었습니다.");
                document.getElementById('arcTitle').value = '';
                document.getElementById('arcLink').value = '';
            });
        }

        // [복구] 3. 자료실 리스트 로드
        function loadArchiveAdmin() {
            db.ref('archives').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('archiveAdminList');
                if(!data) {
                    list.innerHTML = '<p class="text-center py-10 text-gray-400 text-sm italic">등록된 자료가 없습니다.</p>';
                    return;
                }

                list.innerHTML = Object.keys(data).reverse().map(key => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100 group">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold px-2 py-1 bg-white border border-gray-200 rounded text-gray-500">${data[key].category}</span>
                            <span class="text-sm font-bold text-gray-700">${data[key].title}</span>
                        </div>
                        <button onclick="deleteData('archives', '${key}')" class="text-xs font-bold text-red-400 opacity-0 group-hover:opacity-100 transition-all hover:underline">삭제</button>
                    </div>
                `).join('');
            });
        }


// 중고 품목 등록 함수
function addUsedItem() {
    const name = document.getElementById('usedName').value;
    const price = document.getElementById('usedPrice').value;
    const image = document.getElementById('usedImage').value || 'https://via.placeholder.com/400x300?text=No+Image';
    
    if(!name || !price) return alert("제품명과 가격을 입력하세요.");

    db.ref('used_db').push({
        name: name, 
        price: parseInt(price), 
        image: image,
        timestamp: Date.now()
    }).then(() => {
        alert("중고 품목이 등록되었습니다.");
        document.getElementById('usedName').value = '';
        document.getElementById('usedPrice').value = '';
        document.getElementById('usedImage').value = '';
    });
}

// [추가] 등록된 중고 품목 리스트 불러오기 (실시간)
function loadUsedProductsAdmin() {
    db.ref('used_db').on('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('usedProductList');
        if(!data) {
            list.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10 italic">등록된 내역이 없습니다.</p>';
            return;
        }

        list.innerHTML = Object.keys(data).reverse().map(key => `
            <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl group">
                <img src="${data[key].image}" class="w-full h-32 object-cover rounded-xl mb-3 bg-white">
                <h4 class="font-bold text-sm truncate text-gray-800">${data[key].name}</h4>
                <p class="text-green-600 font-black text-sm mb-3">${data[key].price.toLocaleString()}원</p>
                <button onclick="deleteData('used_db', '${key}')" class="w-full py-2 bg-white text-red-500 border border-red-100 rounded-lg text-xs font-bold hover:bg-red-50">삭제</button>
            </div>
        `).join('');
    });
}

// 부품 등록 로직
function addPartItem() {
    const category = document.getElementById('partCategory').value;
    const name = document.getElementById('partName').value;
    const price = parseInt(document.getElementById('partPrice').value);
    const stock = parseInt(document.getElementById('partStock').value);
    const image = document.getElementById('partImage').value || 'https://via.placeholder.com/100';
    const description = document.getElementById('partDesc').value; // 변수명 변경

    if(!name || isNaN(price)) return alert("부품명과 가격은 필수입니다.");

    db.ref('parts_db').push({
        category, 
        name, 
        price, 
        stock, 
        image, 
        description, 
        timestamp: Date.now()
    }).then(() => {
        alert("부품이 DB에 등록되었습니다.");
        // 초기화 로직...
        document.getElementById('partName').value = '';
        document.getElementById('partPrice').value = '';
        document.getElementById('partStock').value = '';
        document.getElementById('partImage').value = '';
        document.getElementById('partDesc').value = '';    });
}

// 1. 부품 저장 (등록 및 수정 공용)
function savePartItem() {
    const name = document.getElementById('partName').value;
    const price = parseInt(document.getElementById('partPrice').value);
    
    if(!name || isNaN(price)) {
        alert("부품명과 가격을 정확히 입력해주세요.");
        return;
    }

    const partData = {
        category: document.getElementById('partCategory').value,
        name: name,
        price: price,
        image: document.getElementById('partImage').value || "https://via.placeholder.com/150",
        description: document.getElementById('partDesc').value,
        timestamp: Date.now()
    };

    if (editingPartKey) {
        // 수정 모드: 기존 경로의 데이터를 업데이트
        db.ref('parts_db').child(editingPartKey).update(partData)
            .then(() => {
                alert("수정이 완료되었습니다.");
                resetPartForm(); // 폼 초기화
            })
            .catch(err => alert("수정 실패: " + err));
    } else {
        // 등록 모드: 새로운 데이터를 추가
        db.ref('parts_db').push(partData)
            .then(() => {
                alert("새 부품이 등록되었습니다.");
                resetPartForm(); // 폼 초기화
            })
            .catch(err => alert("등록 실패: " + err));
    }
}

// editPart 함수 수정
// 수정 모드 진입
function editPart(key, json) {
    const item = JSON.parse(decodeURIComponent(json));
    editingPartKey = key; // 중요: 수정할 데이터의 ID를 전역 변수에 저장

    document.getElementById('partCategory').value = item.category;
    document.getElementById('partName').value = item.name;
    document.getElementById('partPrice').value = item.price;
    document.getElementById('partImage').value = item.image || "";
    document.getElementById('partDesc').value = item.description || item.desc || "";

    // 버튼 텍스트 변경으로 수정 모드임을 알림
    document.getElementById('submitBtn').innerText = "부품 정보 수정 완료";
    if(document.getElementById('cancelBtn')) {
        document.getElementById('cancelBtn').classList.remove('hidden');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetPartForm() {
    editingPartKey = null; // 중요: 등록 모드로 전환하기 위해 null 처리
    document.getElementById('partName').value = "";
    document.getElementById('partPrice').value = "";
    document.getElementById('partImage').value = "";
    document.getElementById('partDesc').value = "";
    document.getElementById('submitBtn').innerText = "부품 데이터 등록";
    if(document.getElementById('cancelBtn')) {
        document.getElementById('cancelBtn').classList.add('hidden');
    }
}

    // 부품 삭제
    function deletePart(key) {
        if(confirm("정말 삭제하시겠습니까?")) {
            db.ref('parts_db').child(key).remove();
        }
    }

    // 리스트 로드
    function loadPartsAdmin() {
        const container = document.getElementById('adminPartsList');
        db.ref('parts_db').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">등록된 데이터가 없습니다.</div>`;
                return;
            }

            const items = Object.entries(data).reverse();
            container.innerHTML = items.map(([key, item]) => {
                const dataJson = encodeURIComponent(JSON.stringify(item));
                return `
                    <div class="flex items-center justify-between bg-white p-5 rounded-3xl border border-gray-100 shadow-sm group hover:border-blue-200 transition-all">
                        <div class="flex items-center gap-5">
                            <img src="${item.image}" class="w-14 h-14 object-cover rounded-2xl bg-gray-50">
                            <div>
                                <div class="flex items-center gap-2 mb-0.5">
                                    <span class="text-[10px] font-black px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full uppercase">${item.category}</span>
                                    <span class="text-xs font-bold text-gray-900">${Number(item.price).toLocaleString()}원</span>
                                </div>
                                <p class="font-bold text-gray-800 text-sm">${item.name}</p>
                                <p class="text-[11px] text-gray-400 mt-1 line-clamp-2">${item.description || item.desc || '설명 없음'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editPart('${key}', '${dataJson}')" class="px-4 py-2 bg-gray-50 text-gray-600 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">수정</button>
                            <button onclick="deletePart('${key}')" class="px-4 py-2 bg-gray-50 text-red-400 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">삭제</button>
                        </div>
                    </div>
                `;
            }).join('');
        });
    }

// window.onload 에 추가
window.onload = () => {
    if (sessionStorage.getItem("adminLoggedIn")) {
        loadRequests();      
        loadArchiveAdmin();  
        loadUsedProductsAdmin(); // 중고 리스트 로드 추가
    }
};
// 인증 관련 함수들
    function updateAuthUI() {
        const authArea = document.getElementById('authButtons');
        const isLoggedIn = sessionStorage.getItem("adminLoggedIn") === "true";

        if (isLoggedIn) {
            authArea.innerHTML = `
                <button onclick="logout()" class="text-sm font-bold text-red-500 bg-red-50 px-5 py-2.5 rounded-xl hover:bg-red-100 transition-all italic">
                    LOGOUT
                </button>
            `;
        } else {
            authArea.innerHTML = `
                <button onclick="showLoginModal()" class="text-sm font-bold text-blue-600 bg-blue-50 px-5 py-2.5 rounded-xl hover:bg-blue-100 transition-all italic">
                    LOGIN
                </button>
            `;
        }
    }

    function showLoginModal() {
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('loginModal').classList.add('flex');
        document.getElementById('adminPw').focus();
    }

    function checkAdmin() {
        const pw = document.getElementById('adminPw').value;
        if(pw === "0927") { // **
            sessionStorage.setItem("adminLoggedIn", "true");
            alert("관리자 인증에 성공했습니다.");
            location.reload(); // 리스트 로드를 위해 새로고침
        } else {
            alert("암호가 틀렸습니다.");
            document.getElementById('adminPw').value = "";
        }
    }

    function logout() {
        if(confirm("로그아웃 하시겠습니까?")) {
            sessionStorage.removeItem("adminLoggedIn");
            alert("로그아웃 되었습니다.");
            location.href = "index.html"; // 메인으로 튕겨내기
        }
    }

    // 페이지 로드 시 상태 체크
    window.onload = () => {
        const isLoggedIn = sessionStorage.getItem("adminLoggedIn") === "true";
        updateAuthUI();

        if (isLoggedIn) {
            // 로그인 상태일 때만 데이터 로드
            if(typeof loadRequests === 'function') loadRequests();
            if(typeof loadArchiveAdmin === 'function') loadArchiveAdmin();
            if(typeof loadUsedProductsAdmin === 'function') loadUsedProductsAdmin();
            loadPartsAdmin();
        } else {
            // 로그인 안 되어 있으면 강제로 로그인 모달 표시
            showLoginModal();
        }
    };

        function deleteData(node, key) {
            if(confirm('데이터를 영구히 삭제하시겠습니까?')) db.ref(node).child(key).remove();
        }

    </script>
</body>
