<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>통합 관리자 모드 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; font-weight: 900; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design Admin</a>
        <button onclick="logout()" class="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors">로그아웃</button>
    </div>
    <div class="max-w-7xl mx-auto px-4 flex gap-8 border-t border-gray-50 overflow-x-auto no-scrollbar">
        <button onclick="switchTab('requests')" id="tab-requests" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap tab-active">신청 내역</button>
        <button onclick="switchTab('parts')" id="tab-parts" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">견적 부품 DB</button>
        <button onclick="switchTab('archive')" id="tab-archive" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">자료실 관리</button>
        <button onclick="switchTab('used')" id="tab-used" class="py-4 text-sm font-bold text-gray-400 whitespace-nowrap">중고 제품 DB</button>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-12">
    <section id="sec-parts" class="tab-content hidden">
        <h2 class="text-2xl font-black mb-6">견적 부품 DB 관리</h2>
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">카테고리</label>
                    <select id="partCategory" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold focus:ring-2 focus:ring-blue-500">
                        <option>CPU</option><option>메인보드</option><option>메모리</option><option>그래픽카드</option>
                        <option>SSD/HDD</option><option>케이스</option><option>파워</option><option>쿨러</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">부품명</label>
                    <input type="text" id="partName" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">판매 가격</label>
                    <input type="number" id="partPrice" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">이미지 URL</label>
                    <input type="text" id="partImage" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 font-bold focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">상세 설명</label>
                    <textarea id="partDesc" rows="4" class="w-full bg-gray-50 border-none rounded-3xl px-6 py-5 font-medium focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>
            </div>
            <div class="mt-8 flex flex-col gap-3">
                <button id="submitBtn" onclick="savePartItem()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95">부품 데이터 등록</button>
                <button id="cancelBtn" onclick="resetPartForm()" class="hidden w-full bg-gray-100 text-gray-500 py-3 rounded-2xl font-bold">수정 취소</button>
            </div>
        </div>
        <div id="adminPartsList" class="space-y-4"></div>
    </section>

    <section id="sec-requests" class="tab-content">
        <h2 class="text-2xl font-black mb-6">신청 내역 (견적/구매)</h2>
        <div id="requestList" class="space-y-4"></div>
    </section>
</main>

<script>
    const firebaseConfig = { databaseURL: "https://well-design-2025-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let editingPartKey = null; // 수정 모드 추적용 변수

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('sec-' + tabId).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('tab-active'));
        document.getElementById('tab-' + tabId).classList.add('tab-active');
    }

    // [부품 DB] 등록 및 수정 로직
    function savePartItem() {
        const name = document.getElementById('partName').value;
        const price = parseInt(document.getElementById('partPrice').value);
        if(!name || isNaN(price)) return alert("이름과 가격을 확인해주세요.");

        const data = {
            category: document.getElementById('partCategory').value,
            name: name,
            price: price,
            image: document.getElementById('partImage').value || "https://via.placeholder.com/150",
            description: document.getElementById('partDesc').value,
            timestamp: Date.now()
        };

        if (editingPartKey) {
            // 수정
            db.ref('parts_db').child(editingPartKey).update(data)
                .then(() => { alert("수정되었습니다."); resetPartForm(); });
        } else {
            // 등록
            db.ref('parts_db').push(data)
                .then(() => { alert("등록되었습니다."); resetPartForm(); });
        }
    }

    function editPart(key, json) {
        const item = JSON.parse(decodeURIComponent(json));
        editingPartKey = key;
        document.getElementById('partCategory').value = item.category;
        document.getElementById('partName').value = item.name;
        document.getElementById('partPrice').value = item.price;
        document.getElementById('partImage').value = item.image || "";
        document.getElementById('partDesc').value = item.description || item.desc || "";
        
        document.getElementById('submitBtn').innerText = "부품 정보 수정 완료";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetPartForm() {
        editingPartKey = null;
        document.getElementById('partName').value = "";
        document.getElementById('partPrice').value = "";
        document.getElementById('partImage').value = "";
        document.getElementById('partDesc').value = "";
        document.getElementById('submitBtn').innerText = "부품 데이터 등록";
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    function loadPartsAdmin() {
        db.ref('parts_db').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('adminPartsList');
            if(!data) { container.innerHTML = ""; return; }
            container.innerHTML = Object.entries(data).reverse().map(([key, item]) => {
                const json = encodeURIComponent(JSON.stringify(item));
                return `
                <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <img src="${item.image}" class="w-16 h-16 rounded-2xl object-cover bg-gray-50">
                            <div>
                                <span class="text-[10px] font-black text-blue-500 uppercase">${item.category}</span>
                                <h4 class="font-bold text-lg">${item.name}</h4>
                                <p class="text-blue-600 font-black">${item.price.toLocaleString()}원</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editPart('${key}', '${json}')" class="px-4 py-2 bg-gray-50 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">수정</button>
                            <button onclick="if(confirm('삭제할까요?')) db.ref('parts_db').child('${key}').remove()" class="px-4 py-2 bg-gray-50 text-red-400 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">삭제</button>
                        </div>
                    </div>
                    <div class="mt-4 p-4 bg-gray-50 rounded-2xl text-sm text-gray-600 whitespace-pre-wrap">${item.description || item.desc || '설명 없음'}</div>
                </div>`;
            }).join('');
        });
    }

    // [신청 내역] 로드
    function loadRequests() {
        db.ref('requests').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('requestList');
            if(!data) { container.innerHTML = "<div class='py-20 text-center text-gray-400'>내역이 없습니다.</div>"; return; }
            container.innerHTML = Object.entries(data).reverse().map(([key, req]) => `
                <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm">
                    <div class="flex justify-between mb-4">
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-full">${req.type || '신청'}</span>
                        <button onclick="db.ref('requests').child('${key}').remove()" class="text-red-300 text-xs">기록 삭제</button>
                    </div>
                    <h3 class="font-black text-xl">${req.name} <span class="text-sm font-normal text-gray-400 ml-2">${req.phone}</span></h3>
                    <div class="mt-2 text-sm text-gray-600">${req.totalPrice}</div>
                    <div class="text-[10px] text-gray-300 mt-4">${new Date(req.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        });
    }

    function logout() { sessionStorage.removeItem("adminLoggedIn"); location.href="index.html"; }

    window.onload = () => {
        if(sessionStorage.getItem("adminLoggedIn") !== "true") {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true");
                loadPartsAdmin(); loadRequests();
            } else location.href="index.html";
        } else {
            loadPartsAdmin(); loadRequests();
        }
    };
</script>
</body>
</html>
