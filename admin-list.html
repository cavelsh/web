<!DOCTYPE html>

        body { font-family: 'Inter', sans-serif; }

</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col">

        <div class="p-4 border-t border-slate-800 text-xs text-slate-500">
            마지막 로그인: 2026-04-13 17:10
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 class="text-xl font-bold">전체 신청 내역</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500 font-medium">관리자(Lee Sang-ho)님 환영합니다.</span>
                <button class="text-xs bg-gray-100 px-3 py-1 rounded hover:bg-gray-200">로그아웃</button>
            </div>
        </header>

        <section class="p-8 overflow-y-auto">
            
            <div class="flex gap-4 mb-6">
                <button class="px-4 py-2 bg-white border rounded-lg text-sm font-bold shadow-sm">전체</button>
                <button class="px-4 py-2 bg-white border rounded-lg text-sm text-gray-500 hover:bg-gray-50">상담 신청</button>
                <button class="px-4 py-2 bg-white border rounded-lg text-sm text-gray-500 hover:bg-gray-50">매입 신청</button>
            </div>

            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">분류</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">신청자</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">연락처</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">내용 요약</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">금액</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">상태</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase">신청일</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr class="hover:bg-gray-50 transition cursor-pointer">
                            <td class="p-4">
                                <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">견적 상담</span>
                            </td>
                            <td class="p-4 font-bold text-sm text-gray-700">홍길동</td>
                            <td class="p-4 text-sm text-gray-600">010-1234-5678</td>
                            <td class="p-4 text-sm text-gray-500 truncate max-w-[200px]">i5-14400F / RTX 4060 Ti 외 5건</td>
                            <td class="p-4 text-sm font-bold text-gray-900 text-right">1,245,000원</td>
                            <td class="p-4">
                                <span class="text-orange-500 font-bold text-xs">● 접수대기</span>
                            </td>
                            <td class="p-4 text-xs text-gray-400">14:20:05</td>
                        </tr>

                        <tr class="hover:bg-gray-50 transition cursor-pointer">
                            <td class="p-4">
                                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">매입 신청</span>
                            </td>
                            <td class="p-4 font-bold text-sm text-gray-700">김철수</td>
                            <td class="p-4 text-sm text-gray-600">010-9876-5432</td>
                            <td class="p-4 text-sm text-gray-500 truncate max-w-[200px]">노트북 (RTX 30 시리즈) / S급</td>
                            <td class="p-4 text-sm font-bold text-gray-900 text-right">650,000원</td>
                            <td class="p-4">
                                <span class="text-blue-500 font-bold text-xs">● 상담완료</span>
                            </td>
                            <td class="p-4 text-xs text-gray-400">11:05:30</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-center mt-8 gap-2">
                <button class="w-8 h-8 flex items-center justify-center rounded border bg-white text-blue-600 font-bold shadow-sm">1</button>
                <button class="w-8 h-8 flex items-center justify-center rounded border bg-white text-gray-400 hover:text-gray-600 transition">2</button>
                <button class="w-8 h-8 flex items-center justify-center rounded border bg-white text-gray-400 hover:text-gray-600 transition">3</button>
            </div>

        </section>
    </main>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>
<script>
    const listBody = document.querySelector('tbody');

    // Firebase에서 데이터 읽어오기 (최신순)
    db.ref('requests').orderByChild('timestamp').on('value', (snapshot) => {
        listBody.innerHTML = ''; // 테이블 초기화
        
        const data = snapshot.val();
        if (data) {
            // 데이터를 배열로 변환 후 역순 정렬 (최신순)
            const sortedKeys = Object.keys(data).reverse();
            
            sortedKeys.forEach(key => {
                const item = data[key];
                const date = new Date(item.timestamp).toLocaleString();
                const typeColor = item.type === "상담 신청" ? "bg-blue-100 text-blue-700" : "bg-green-100 text-green-700";

                const tr = `
                    <tr class="hover:bg-gray-50 border-b transition">
                        <td class="p-4"><span class="${typeColor} text-[10px] font-bold px-2 py-1 rounded-full">${item.type}</span></td>
                        <td class="p-4 font-bold text-sm text-gray-700">${item.name}</td>
                        <td class="p-4 text-sm text-gray-600">${item.phone}</td>
                        <td class="p-4 text-sm text-gray-500">${item.memo || item.device || '내역 없음'}</td>
                        <td class="p-4 text-sm font-bold text-gray-900 text-right">${item.price || item.totalPrice}</td>
                        <td class="p-4 text-xs text-gray-400">${date}</td>
                    </tr>
                `;
                listBody.innerHTML += tr;
            });
        } else {
            listBody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-gray-400">신청 내역이 없습니다.</td></tr>';
        }
    });
</script>
</body>
</html>
