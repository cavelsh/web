<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">COMPATCH</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="hover:text-blue-600">메인으로</a>
                    <a href="estimate.html" class="hover:text-blue-600">실시간 견적</a>
                    <a href="trade-in.html" class="hover:text-blue-600">중고 판매현황</a>
                    <a href="archive.html" class="hover:text-blue-600">자료실</a>
                </div>
            </div>
            <button onclick="logout()" id="logoutBtn" class="hidden text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg">로그아웃</button>
        </div>
    </nav>

    <main class="min-h-screen">
        <div id="loginSection" class="max-w-7xl mx-auto px-4 py-20 flex justify-center">
            <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-md text-center">
                <h2 class="text-2xl font-black mb-8">관리자 인증</h2>
                <input type="password" id="adminPassword" placeholder="암호 입력" class="w-full px-4 py-4 border rounded-2xl mb-4 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition">인증하기</button>
            </div>
        </div>

        <div id="adminMain" class="hidden max-w-7xl mx-auto px-4 py-10">
            
            <section class="mb-20">
                <h2 class="text-3xl font-black mb-8 text-blue-600">중고 판매 물품 등록</h2>
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm mb-10">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="usedName" placeholder="제품명 (예: RTX 3070 완본체)" class="border p-4 rounded-2xl text-sm outline-none">
                        <input type="number" id="usedPrice" placeholder="판매 가격 (숫자만)" class="border p-4 rounded-2xl text-sm outline-none">
                        <input type="text" id="usedImage" placeholder="이미지 URL" class="border p-4 rounded-2xl text-sm outline-none">
                        <button onclick="addUsedItem()" class="bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition">물품 진열하기</button>
                    </div>
                    <p class="text-xs text-gray-400 mt-4">* 이미지 URL이 없으면 기본 이미지가 사용됩니다.</p>
                </div>
                
                <div id="usedAdminList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <section class="mb-20 border-t pt-20">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-3xl font-black">고객 상담/구매 신청</h2>
                    <span class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full" id="totalCount">접수 0건</span>
                </div>
                <div id="requestList" class="grid gap-6"></div>
            </section>
        </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPassword() {
            if (document.getElementById('adminPassword').value === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true");
                showAdminPage();
            } else { alert("암호가 틀렸습니다."); }
        }

        function showAdminPage() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminMain').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadUsedAdmin();
            loadRequests();
        }

        // 중고 물품 등록
        function addUsedItem() {
            const name = document.getElementById('usedName').value;
            const price = document.getElementById('usedPrice').value;
            const image = document.getElementById('usedImage').value || 'https://via.placeholder.com/400x300?text=No+Image';
            
            if(!name || !price) return alert("이름과 가격은 필수입니다.");

            db.ref('used_items').push({
                name, price: parseInt(price), image, timestamp: Date.now()
            }).then(() => {
                alert("중고 상품이 등록되었습니다.");
                document.getElementById('usedName').value = '';
                document.getElementById('usedPrice').value = '';
                document.getElementById('usedImage').value = '';
            });
        }

        // 등록된 중고 물품 관리
        function loadUsedAdmin() {
            db.ref('used_items').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('usedAdminList');
                if(!data) { list.innerHTML = '<p class="text-gray-400">등록된 상품이 없습니다.</p>'; return; }

                list.innerHTML = Object.keys(data).reverse().map(key => `
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center gap-4">
                        <img src="${data[key].image}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <p class="font-bold text-sm text-gray-800">${data[key].name}</p>
                            <p class="text-blue-600 font-black text-sm">${data[key].price.toLocaleString()}원</p>
                        </div>
                        <button onclick="deleteData('used_items', '${key}')" class="text-xs text-red-400 hover:underline">삭제</button>
                    </div>
                `).join('');
            });
        }

        // 고객 상담 내역 로드
        function loadRequests() {
            db.ref('requests').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('requestList');
                if(!data) { list.innerHTML = '<p class="text-gray-400 text-center py-10">내역 없음</p>'; return; }

                const keys = Object.keys(data).reverse();
                document.getElementById('totalCount').innerText = `접수 ${keys.length}건`;

                list.innerHTML = keys.map(key => {
                    const req = data[key];
                    const isUsed = req.type === "중고 구매 신청";
                    return `
                        <div class="bg-white rounded-3xl border border-gray-100 p-6 flex flex-col md:flex-row gap-6 shadow-sm">
                            <div class="flex-1">
                                <span class="text-[10px] ${isUsed ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'} px-2 py-1 rounded font-bold mb-2 inline-block">${isUsed ? '중고구매' : '신조립견적'}</span>
                                <h3 class="font-black text-lg">${req.name} (${req.phone})</h3>
                                <p class="text-sm text-gray-500 mt-2">요청내용: ${isUsed ? req.appliedItem : (req.memo || '없음')}</p>
                            </div>
                            <div class="md:w-48 text-right flex flex-col justify-center">
                                <p class="text-xl font-black ${isUsed ? 'text-orange-600' : 'text-blue-600'}">${isUsed ? req.expectedPrice.toLocaleString() + '원' : req.totalPrice}</p>
                                <button onclick="deleteData('requests', '${key}')" class="text-xs text-red-300 underline mt-2">내역 삭제</button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function deleteData(node, key) {
            if(confirm('정말 삭제하시겠습니까?')) db.ref(node).child(key).remove();
        }

        function logout() { sessionStorage.removeItem("adminLoggedIn"); location.reload(); }
        window.onload = () => { if (sessionStorage.getItem("adminLoggedIn") === "true") showAdminPage(); };
    </script>
</body>
</html>
