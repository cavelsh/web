<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">COMPATCH</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="hover:text-blue-600">메인으로</a>
                    <a href="estimate.html" class="hover:text-blue-600">실시간 견적</a>
                    <a href="trade-in.html" class="hover:text-blue-600">중고 매입</a>
                    <a href="archive.html" class="hover:text-blue-600">자료실</a>
                    <a href="admin-list.html" class="text-blue-600">관리자</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="logout()" id="logoutBtn" class="hidden text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100">로그아웃</button>
            </div>
        </div>
    </nav>

    <div id="loginSection" class="max-w-7xl mx-auto px-4 py-20 flex justify-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-md text-center">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="text-2xl font-black mb-2">관리자 인증</h2>
            <p class="text-gray-400 text-sm mb-8">상담 내역 확인을 위해 암호를 입력하세요.</p>
            <input type="password" id="adminPassword" placeholder="암호 입력" 
                   class="w-full px-4 py-4 border border-gray-200 rounded-2xl mb-4 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="checkPassword()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                인증하기
            </button>
        </div>
    </div>

    <div id="adminMain" class="hidden max-w-7xl mx-auto px-4 py-10">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black mb-2">견적 상담 관리</h2>
                <p class="text-gray-500">실시간으로 접수된 고객님들의 견적 요청 내역입니다.</p>
            </div>
            <div class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full" id="totalCount">접수 0건</div>
        </div>

        <div id="requestList" class="grid gap-6">
            <div class="py-20 text-center text-gray-400">내역을 불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        // Firebase 설정 (전달해주신 정보 기준)
        const firebaseConfig = {
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [기능 1] 암호 확인 및 페이지 전환
        function checkPassword() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === "0927") {
                sessionStorage.setItem("adminLoggedIn", "true");
                showAdminPage();
            } else {
                alert("암호가 일치하지 않습니다.");
                document.getElementById('adminPassword').value = '';
            }
        }

        function showAdminPage() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminMain').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadRequests();
        }

        function logout() {
            sessionStorage.removeItem("adminLoggedIn");
            location.reload();
        }

        // 페이지 로드 시 상태 확인
        window.onload = function() {
            if (sessionStorage.getItem("adminLoggedIn") === "true") {
                showAdminPage();
            }
        };

        // [기능 2] 신청 내역 및 선택 물품 정보 로드
        function loadRequests() {
            const listContainer = document.getElementById('requestList');
            
            db.ref('requests').orderByChild('timestamp').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    listContainer.innerHTML = '<div class="py-20 text-center text-gray-400">접수된 상담 신청 내역이 없습니다.</div>';
                    document.getElementById('totalCount').innerText = "접수 0건";
                    return;
                }

                const keys = Object.keys(data).reverse();
                document.getElementById('totalCount').innerText = `접수 ${keys.length}건`;

                const html = keys.map(key => {
                    const req = data[key];
                    
                    // 핵심 수정: 신청한 물품(items) 정보가 있을 경우 리스트 생성
                    const itemsHtml = req.items ? req.items.map(item => `
                        <div class="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                            <div>
                                <span class="text-[10px] font-bold text-blue-500 block">${item.cat || '부품'}</span>
                                <span class="text-xs font-bold text-gray-700">${item.name}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-gray-400 block">${item.quantity}개</span>
                                <span class="text-xs font-black">${(item.price * item.quantity).toLocaleString()}원</span>
                            </div>
                        </div>
                    `).join('') : '<p class="text-gray-300 text-xs">선택된 물품 정보가 없습니다.</p>';

                    return `
                        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col lg:flex-row transition-hover hover:shadow-md">
                            <div class="p-8 flex-1">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="px-3 py-1 bg-gray-900 text-white text-[10px] font-bold rounded-full">
                                        ${new Date(req.timestamp).toLocaleString()}
                                    </span>
                                    <h3 class="text-xl font-black">${req.name}</h3>
                                    <a href="tel:${req.phone}" class="text-blue-600 font-bold text-sm hover:underline">${req.phone}</a>
                                </div>
                                
                                <div class="mb-6">
                                    <p class="text-xs font-bold text-gray-400 mb-2 uppercase">고객 요청 메모</p>
                                    <p class="text-gray-600 bg-gray-50 p-4 rounded-2xl text-sm italic">
                                        "${req.memo || '남긴 메모가 없습니다.'}"
                                    </p>
                                </div>

                                <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100/50">
                                    <p class="text-xs font-bold text-blue-400 mb-3 uppercase">신청 부품 리스트</p>
                                    ${itemsHtml}
                                </div>
                            </div>
                            
                            <div class="bg-gray-50 p-8 lg:w-64 flex flex-col justify-center items-center lg:items-end border-t lg:border-t-0 lg:border-l border-gray-100">
                                <p class="text-xs font-bold text-gray-400 mb-1">최종 견적 금액</p>
                                <p class="text-2xl font-black text-blue-600 mb-6">${req.totalPrice}</p>
                                <button onclick="deleteRequest('${key}')" class="text-xs font-bold text-red-400 hover:text-red-600 transition">
                                    기록 삭제하기
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                listContainer.innerHTML = html;
            });
        }

        function deleteRequest(key) {
            if(confirm('이 상담 내역을 영구히 삭제하시겠습니까?')) {
                db.ref('requests').child(key).remove();
            }
        }
    </script>
</body>
</html>
