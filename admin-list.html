    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

let editingPartKey = null;

// 갤러리 로드 함수
function showSection(sectionId) {
    // 모든 관리 섹션을 숨김 (관리자 페이지 내의 다른 section들 포함)
    document.querySelectorAll('.admin-section, main > section').forEach(sec => {
        sec.classList.add('hidden');
    });
    // 선택한 섹션만 표시
    const target = document.getElementById(sectionId);
    if(target) {
        target.classList.remove('hidden');
        if(sectionId === 'galleryAdmin') loadGalleryAdmin(); // 갤러리 탭 클릭 시 로드
    }
}

function loadGalleryAdmin() {
    db.ref('gallery').on('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('adminGalleryList');
        if(!data) { list.innerHTML = "등록된 데이터가 없습니다."; return; }

        let html = '';
        Object.keys(data).reverse().forEach(key => {
            const item = data[key];
            html += `
                <div class="bg-white p-4 rounded-xl border flex items-center gap-4">
                    <img src="${item.imgUrl}" class="w-20 h-20 object-cover rounded-lg">
                    <div class="flex-1">
                        <div class="font-bold">${item.title}</div>
                        <div class="text-sm text-gray-500">${item.category}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editGallery('${key}')" class="text-sm text-blue-600 font-bold">수정</button>
                        <button onclick="deleteGallery('${key}')" class="text-sm text-red-600 font-bold">삭제</button>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;
    });
}

// 저장/수정 함수
function saveGallery() {
    const key = document.getElementById('galleryKey').value;
    const data = {
        title: document.getElementById('gTitle').value,
        category: document.getElementById('gCategory').value,
        imgUrl: document.getElementById('gImgUrl').value,
        desc: document.getElementById('gDesc').value,
        timestamp: Date.now()
    };

    if(key) {
        db.ref(`gallery/${key}`).update(data).then(() => {
            alert("수정되었습니다.");
            closeGalleryModal();
        });
    } else {
        db.ref('gallery').push(data).then(() => {
            alert("등록되었습니다.");
            closeGalleryModal();
        });
    }
}

// 삭제 함수
function deleteGallery(key) {
    if(confirm("정말 삭제하시겠습니까?")) {
        db.ref(`gallery/${key}`).remove().then(() => alert("삭제되었습니다."));
    }
}

// 수정 시 모달 채우기
function editGallery(key) {
    db.ref(`gallery/${key}`).once('value', (snap) => {
        const data = snap.val();
        document.getElementById('galleryKey').value = key;
        document.getElementById('gTitle').value = data.title;
        document.getElementById('gCategory').value = data.category;
        document.getElementById('gImgUrl').value = data.imgUrl;
        document.getElementById('gDesc').value = data.desc;
        document.getElementById('galleryModalTitle').innerText = "사례 수정";
        document.getElementById('galleryModal').classList.replace('hidden', 'flex');
    });
}

function openGalleryModal() {
    document.getElementById('galleryKey').value = "";
    document.getElementById('gTitle').value = "";
    document.getElementById('gImgUrl').value = "";
    document.getElementById('gDesc').value = "";
    document.getElementById('galleryModalTitle').innerText = "새 사례 등록";
    document.getElementById('galleryModal').classList.replace('hidden', 'flex');
}

function closeGalleryModal() {
    document.getElementById('galleryModal').classList.replace('flex', 'hidden');
}

        // [복구] 1. 고객 견적/판매 신청 내역 로드 및 상세 부품 표시
function loadRequests() {
    db.ref('requests').on('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('requestAdminList');
        const countText = document.getElementById('requestCount');

        if (!data) {
            list.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 bg-white rounded-[32px] border border-gray-100">접수된 내역이 없습니다.</p>';
            countText.innerText = "접수 0건";
            return;
        }

        const keys = Object.keys(data).reverse();
        countText.innerText = `접수 ${keys.length}건`;

        list.innerHTML = keys.map(key => {
            const req = data[key];
            const date = new Date(req.timestamp).toLocaleString();
            
            // [부품 상세 리스트 생성 수정]
            // 신규 데이터 형식(items_list)이 있으면 그것을 보여주고, 없으면 기존 객체 형식(items)을 처리합니다.
            let itemsHtml = '';
            if (req.items_list) {
                // 줄바꿈 문자를 <br>로 변경하여 깔끔하게 표시
                itemsHtml = `<div class="text-[11px] text-gray-700 leading-relaxed font-medium">${req.items_list.replace(/\n/g, '<br>')}</div>`;
            } else if (req.items) {
                // 구버전 데이터 호환용
                itemsHtml = Object.entries(req.items).map(([cat, item]) => `
                    <div class="flex justify-between items-center text-[11px] py-1 border-b border-gray-50 last:border-0">
                        <span class="text-gray-400 font-bold w-16 shrink-0">${cat}</span>
                        <span class="flex-1 text-gray-700 truncate px-2 font-medium">${item.name}</span>
                        <span class="text-blue-600 font-black shrink-0">${item.count}개</span>
                    </div>
                `).join('');
            } else {
                itemsHtml = '<p class="text-gray-300 text-[11px] text-center py-2">부품 선택 정보가 없습니다.</p>';
            }

            return `
                <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="px-2 py-0.5 bg-blue-600 text-[10px] font-bold text-white rounded mb-2 inline-block">${req.type || '견적 신청'}</span>
                            <h3 class="text-xl font-black text-gray-800">${req.name}</h3>
                            <p class="text-sm font-bold text-blue-500">${req.phone}</p>
                        </div>
                        <button onclick="deleteData('requests', '${key}')" class="text-gray-300 hover:text-red-500 text-sm">삭제</button>
                    </div>

                    <div class="bg-gray-50/50 p-4 rounded-2xl mb-4 border border-gray-100">
                        <p class="text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-wider">Selected Parts Details</p>
                        <div class="space-y-0.5">
                            ${itemsHtml}
                        </div>
                    </div>

                    <div class="space-y-2 px-1">
                        <div class="bg-blue-50/50 p-3 rounded-xl">
                            <p class="text-[9px] font-bold text-blue-400 mb-1">고객 요청사항</p>
                            <p class="text-[11px] text-gray-600 leading-snug">${req.memo || '내용 없음'}</p>
                        </div>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-xs font-bold text-gray-400">최종 견적가</span>
                            <!-- 합계 금액 필드 수정: total_price와 totalPrice 모두 대응 -->
                            <span class="text-lg font-black text-gray-900">${req.total_price || req.totalPrice || '0원'}</span>
                        </div>
                    </div>
                    <p class="mt-4 text-[9px] text-gray-300 text-right font-medium italic">${date}</p>
                </div>
            `;
        }).join('');
    });
}

        // [복구] 2. 자료실 등록 기능
        function addArchive() {
            const category = document.getElementById('arcCategory').value;
            const title = document.getElementById('arcTitle').value;
            const link = document.getElementById('arcLink').value;
            
            if(!title || !link) return alert("자료 제목과 다운로드 링크를 입력해주세요.");

            db.ref('archives').push({
                category,
                title,
                link,
                date: new Date().toISOString().split('T')[0]
            }).then(() => {
                alert("자료가 등록되었습니다.");
                document.getElementById('arcTitle').value = '';
                document.getElementById('arcLink').value = '';
            });
        }

        // [복구] 3. 자료실 리스트 로드
        function loadArchiveAdmin() {
            db.ref('archives').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('archiveAdminList');
                if(!data) {
                    list.innerHTML = '<p class="text-center py-10 text-gray-400 text-sm italic">등록된 자료가 없습니다.</p>';
                    return;
                }

                list.innerHTML = Object.keys(data).reverse().map(key => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100 group">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold px-2 py-1 bg-white border border-gray-200 rounded text-gray-500">${data[key].category}</span>
                            <span class="text-sm font-bold text-gray-700">${data[key].title}</span>
                        </div>
                        <button onclick="deleteData('archives', '${key}')" class="text-xs font-bold text-red-400 opacity-0 group-hover:opacity-100 transition-all hover:underline">삭제</button>
                    </div>
                `).join('');
            });
        }


let editingUsedKey = null; // 중고 수정 상태 추적

// 중고 품목 저장 (등록 및 수정 공용)
function saveUsedItem() {
    const name = document.getElementById('usedName').value;
    const price = document.getElementById('usedPrice').value;
    const image = document.getElementById('usedImage').value || 'https://via.placeholder.com/400x300?text=No+Image';
    const description = document.getElementById('usedDesc') ? document.getElementById('usedDesc').value : ""; // 설명 필드 추가 필요
    
    if(!name || !price) return alert("제품명과 가격을 입력하세요.");

    const usedData = {
        name: name, 
        price: parseInt(price), 
        image: image,
        description: description, // 상세 설명 저장
        timestamp: Date.now()
    };

    if (editingUsedKey) {
        db.ref('used_db').child(editingUsedKey).update(usedData).then(() => {
            alert("중고 품목이 수정되었습니다.");
            resetUsedForm();
        });
    } else {
        db.ref('used_db').push(usedData).then(() => {
            alert("중고 품목이 등록되었습니다.");
            resetUsedForm();
        });

}

// 중고 수정 모드 진입
function editUsed(key, dataJson) {

    document.getElementById('usedPrice').value = data.price;

// 1. 부품 저장 (등록 및 수정 공용)
function savePartItem() {
        const category = document.getElementById('partCategory').value;
        const name = document.getElementById('partName').value;
        const price = parseInt(document.getElementById('partPrice').value);
        const image = document.getElementById('partImage').value || 'https://via.placeholder.com/150';
        const description = document.getElementById('partDesc').value;

        if(!name || isNaN(price)) return alert("부품명과 가격을 입력해주세요.");

        const partData = {
            category,
            name,
            price,
            image,
            description,
            timestamp: Date.now()
        };

        if (editingPartKey) {
            // 수정 모드
            db.ref('parts_db').child(editingPartKey).update(partData).then(() => {
                alert("성공적으로 수정되었습니다.");
                resetPartForm();
            });
        } else {
            // 등록 모드
            db.ref('parts_db').push(partData).then(() => {
                alert("신규 등록되었습니다.");
                resetPartForm();
            });
        }
    }

// loadUsedProductsAdmin 함수 내 HTML 템플릿 수정
function loadUsedProductsAdmin() {
    db.ref('used_db').on('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('usedProductList');
        if(!data) {
            list.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10 italic">등록된 내역이 없습니다.</p>';

        }

        list.innerHTML = Object.keys(data).reverse().map(key => {
            const item = data[key];
            const dataJson = encodeURIComponent(JSON.stringify(item));
            return `
                <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl group">
                    <img src="${item.image}" class="w-full h-32 object-cover rounded-xl mb-3 bg-white">
                    <h4 class="font-bold text-sm truncate text-gray-800">${item.name}</h4>
                    <p class="text-[10px] text-gray-400 line-clamp-1 mb-1">${item.description || '설명 없음'}</p>
                    <p class="text-green-600 font-black text-sm mb-3">${Number(item.price).toLocaleString()}원</p>
                    <div class="flex gap-1">
                        <button onclick="editUsed('${key}', '${dataJson}')" class="flex-1 py-2 bg-white text-blue-500 border border-blue-100 rounded-lg text-xs font-bold hover:bg-blue-50">수정</button>
                        <button onclick="deleteData('used_db', '${key}')" class="flex-1 py-2 bg-white text-red-500 border border-red-100 rounded-lg text-xs font-bold hover:bg-red-50">삭제</button>
                    </div>
                </div>
            `;
        }).join('');
    });
}

// [핵심] 탭 전환 함수
    function switchTab(tabId) {
        // 모든 섹션 숨기기
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        // 모든 버튼 스타일 초기화
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'text-blue-600');
            b.classList.add('text-gray-500');
        });

        // 선택한 섹션 표시 및 버튼 활성화
        document.getElementById(`section-${tabId}`).classList.remove('hidden');
        document.getElementById(`btn-${tabId}`).classList.add('active', 'text-blue-600');
        document.getElementById(`btn-${tabId}`).classList.remove('text-gray-500');

        // Q&A 탭 클릭 시 데이터 로드
        if(tabId === 'qna') loadAdminQnA();
    }

    // [신규] Q&A 데이터 로드 및 렌더링
function loadAdminQnA() {
    db.ref('qna').orderByChild('timestamp').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('admin-qna-list');
        if(!container) return; // 컨테이너가 없으면 중단
        
        if(!data) {
            container.innerHTML = "<p class='text-center py-20 text-gray-400 font-medium'>등록된 문의가 없습니다.</p>";
            return;
        }

        let html = "";
        const keys = Object.keys(data).reverse();

        keys.forEach(id => {
            const item = data[id];
            const date = new Date(item.timestamp).toLocaleString();
            html += `
                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm mb-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black px-2 py-1 rounded-full ${item.status === 'completed' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                                ${item.status === 'completed' ? '답변완료' : '답변대기'}
                            </span>
                            <h3 class="text-xl font-bold mt-2">${item.title}</h3>
                            <p class="text-xs text-gray-400 font-medium">작성자: ${item.author} | PW: ${item.pw} | ${date}</p>
                        </div>
                        <button onclick="deleteQnA('${id}')" class="text-red-400 text-xs font-bold">삭제</button>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-2xl mb-4 text-sm whitespace-pre-wrap">${item.content}</div>
                    <textarea id="ans-${id}" class="w-full h-24 p-4 border rounded-2xl text-sm mb-2" placeholder="답변 입력">${item.answer || ''}</textarea>
                    <button onclick="submitAnswer('${id}')" class="w-full bg-gray-900 text-white py-3 rounded-2xl font-bold text-sm">답변 저장</button>
                </div>
            `;
        });
        container.innerHTML = html;
    });
}

// 답변 및 삭제 함수도 함께 있어야 작동합니다.
function submitAnswer(id) {
    const answer = document.getElementById(`ans-${id}`).value;
    db.ref(`qna/${id}`).update({ answer: answer, status: "completed" }).then(() => alert("저장되었습니다."));
}
function deleteQnA(id) {
    if(confirm("삭제할까요?")) db.ref(`qna/${id}`).remove();
}
