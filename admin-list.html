<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">COMPATCH</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="hover:text-blue-600">메인으로</a>
                </div>
            </div>
            <button onclick="logout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl">로그아웃</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10 space-y-12">
        
        <section>
            <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
                <span class="w-2 h-8 bg-indigo-600 rounded-full"></span> 관리자 판매 상품 관리
            </h2>
            <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-sm mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="prodName" placeholder="상품명 (예: 사무용 조립PC)" class="px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none text-sm">
                    <input type="number" id="prodPrice" placeholder="판매 가격 (숫자만)" class="px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none text-sm">
                    <input type="text" id="prodImg" placeholder="이미지 주소(URL)" class="px-5 py-4 bg-gray-50 border-none rounded-2xl outline-none text-sm">
                </div>
                <button onclick="addProduct()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black hover:bg-indigo-700 transition-all">판매 상품 등록</button>
                
                <div id="productAdminList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
                    </div>
            </div>
        </section>

        <hr class="border-gray-200">

        <section>
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-black flex items-center gap-2">
                    <span class="w-2 h-8 bg-blue-600 rounded-full"></span> 고객 견적/판매 신청 내역
                </h2>
                <p class="text-sm text-gray-400" id="requestCount">접수 0건</p>
            </div>
            <div id="requestAdminList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        </main>

    <div id="loginModal" class="fixed inset-0 bg-gray-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-8 text-blue-600 uppercase italic">Admin Access</h2>
            <input type="password" id="adminPw" placeholder="Access Key" class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl mb-4 text-center text-xl font-bold outline-none">
            <button onclick="checkAdmin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg">관리자 로그인</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. 관리자 판매 상품 등록 (products 노드)
        function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = parseInt(document.getElementById('prodPrice').value);
            const img = document.getElementById('prodImg').value || "https://images.unsplash.com/photo-1587831990711-23ca6441447b?w=400";
            
            if(!name || !price) return alert("상품명과 가격을 입력하세요.");

            db.ref('products').push({ name, price, img, timestamp: Date.now() })
              .then(() => {
                  alert("상품이 등록되었습니다.");
                  document.getElementById('prodName').value = '';
                  document.getElementById('prodPrice').value = '';
                  document.getElementById('prodImg').value = '';
              });
        }

        function loadProductAdmin() {
            db.ref('products').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('productAdminList');
                if(!data) { list.innerHTML = '<p class="text-gray-400 text-xs">등록된 상품 없음</p>'; return; }

                list.innerHTML = Object.keys(data).reverse().map(key => `
                    <div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                        <img src="${data[key].img}" class="w-full h-32 object-cover rounded-xl mb-3">
                        <h4 class="font-bold text-sm truncate">${data[key].name}</h4>
                        <p class="text-indigo-600 font-black mb-3">${data[key].price.toLocaleString()}원</p>
                        <button onclick="deleteData('products', '${key}')" class="w-full py-2 bg-red-50 text-red-500 rounded-lg text-xs font-bold">삭제</button>
                    </div>
                `).join('');
            });
        }

        // 2. 고객 견적/판매 내역 로드 (requests 노드)
        function loadRequests() {
            db.ref('requests').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('requestAdminList');
                if(!data) { list.innerHTML = '<p class="col-span-full text-center py-10 text-gray-400">내역 없음</p>'; return; }

                const keys = Object.keys(data).reverse();
                list.innerHTML = keys.map(key => {
                    const req = data[key];
                    const date = new Date(req.timestamp).toLocaleString();
                    return `
                        <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="px-2 py-0.5 bg-blue-600 text-[10px] font-bold text-white rounded mb-2 inline-block">${req.type || '신청'}</span>
                                    <h3 class="text-lg font-black">${req.name}</h3>
                                    <p class="text-sm font-bold text-blue-500">${req.phone}</p>
                                </div>
                                <button onclick="deleteData('requests', '${key}')" class="text-gray-300 hover:text-red-500">삭제</button>
                            </div>
                            <div class="text-xs text-gray-600 bg-gray-50 p-4 rounded-2xl">
                                ${req.appliedItem ? `<p class="mb-1 font-bold text-indigo-600">신청상품: ${req.appliedItem}</p>` : ''}
                                <p class="italic">"${req.memo || '메모 없음'}"</p>
                            </div>
                            <p class="text-[10px] text-gray-300 text-right mt-3">${date}</p>
                        </div>
                    `;
                }).join('');
            });
        }

        // 공통 기능 (로그인, 삭제 등)
        function checkAdmin() {
            if(document.getElementById('adminPw').value === "1004") {
                sessionStorage.setItem("adminLoggedIn", "true");
                location.reload();
            } else { alert("인증키 오류"); }
        }

        function deleteData(node, key) {
            if(confirm('삭제하시겠습니까?')) db.ref(node).child(key).remove();
        }

        function logout() { sessionStorage.removeItem("adminLoggedIn"); location.reload(); }

        window.onload = () => {
            if (sessionStorage.getItem("adminLoggedIn")) {
                loadProductAdmin(); // 관리자 상품 관리 로드
                loadRequests();     // 고객 신청 내역 로드
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
                document.getElementById('loginModal').classList.add('flex');
            }
        };
    </script>
</body>
</html>
