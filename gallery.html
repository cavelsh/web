<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수리/조립 갤러리 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                <a href="index.html" class="hover:text-blue-600">메인으로</a>
                <a href="estimate.html" class="hover:text-blue-600">컴퓨터 견적내기</a>
                <a href="trade-in.html" class="hover:text-blue-600">중고 판매</a>
                <a href="gallery.html" class="text-blue-600">수리/조립 갤러리</a>
                <a href="archive.html" class="hover:text-blue-600">자료실</a>
                <a href="qna.html" class="hover:text-blue-600">상담 문의및 답변</a>
                <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
            </div>
        </div>
    </div>
</nav>
    <main class="max-w-7xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black mb-8">수리/조립 갤러리</h1>
        <div id="galleryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        // Firebase 설정 (기존 소스의 config 입력)
        const firebaseConfig = { 
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadGallery() {
            db.ref('gallery').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('galleryContainer');
                if(!data) {
                    container.innerHTML = "<p>등록된 사례가 없습니다.</p>";
                    return;
                }
                
                let html = '';
                Object.keys(data).reverse().forEach(key => {
                    const item = data[key];
                    html += `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                            <img src="${item.imgUrl}" alt="${item.title}" class="w-full h-64 object-cover">
                            <div class="p-6">
                                <span class="text-blue-600 text-xs font-bold uppercase">${item.category}</span>
                                <h3 class="text-xl font-bold mt-2">${item.title}</h3>
                                <p class="text-gray-600 mt-2 text-sm">${item.desc}</p>
                                <p class="text-gray-400 text-xs mt-4">${new Date(item.timestamp).toLocaleDateString()}</p>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
