<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sticky-summary { position: sticky; top: 5rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="index.html" class="text-blue-600">메인으로</a>
                <a href="#" class="text-blue-600">실시간 견적</a>
                <a href="trade-in.html">중고 매입</a>
                <a href="archive.html">자료실</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1">
                <h2 class="text-2xl font-black tracking-tight mb-8">부품 선택 <span class="text-blue-600 text-sm ml-2">네이버 실시간 시세 반영 중</span></h2>
                
                <div id="categorySections" class="space-y-12">
                    <div class="p-10 text-center text-gray-400">데이터를 불러오고 있습니다...</div>
                </div>
            </div>

            <div class="w-full lg:w-96">
                <div class="sticky-summary bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
                    <div class="p-6 bg-gray-900 text-white">
                        <h3 class="text-lg font-bold">최종 견적 합계</h3>
                        <p class="text-3xl font-black text-blue-400 mt-2" id="totalDisplay">0원</p>
                    </div>
                    
                    <div class="p-6">
                        <div id="selectedList" class="space-y-4 mb-6 min-h-[150px]">
                            <p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>
                        </div>
                        
                        <div class="border-t border-dashed pt-6 space-y-4">
                            <label class="flex items-center justify-between p-3 bg-blue-50 rounded-xl cursor-pointer group">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="assemblyOption" onchange="updateUI()" class="w-5 h-5 accent-blue-600">
                                    <span class="text-sm font-bold text-gray-700">조립 및 1년 A/S 포함</span>
                                </div>
                                <span class="text-sm font-black text-blue-600">+100,000원</span>
                            </label>

                            <div class="flex justify-between text-sm px-2">
                                <span class="text-gray-500">선택 품목 수</span>
                                <span class="font-bold" id="itemCount">0개</span>
                            </div>
                        </div>

                        <button onclick="openConsultModal()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                            상담 신청하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
<div id="consultModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] p-4">
    <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
        <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">상담 신청하기</h3>
            <button onclick="closeConsultModal()" class="text-gray-400 hover:text-white">닫기</button>
        </div>
        <form id="consultForm" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1">최종 견적 금액</label>
                <p id="modalTotalPrice" class="text-2xl font-black text-blue-600">0원</p>
            </div>
            <input type="text" id="userName" required placeholder="성함" class="w-full p-3 border rounded-xl">
            <input type="tel" id="userPhone" required placeholder="연락처" class="w-full p-3 border rounded-xl">
            <textarea id="userMemo" placeholder="메모" class="w-full p-3 border rounded-xl"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black">신청 완료</button>
        </form>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase 설정
        const firebaseConfig = {
            authDomain: "compatch-e7305.firebaseapp.com",
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "compatch-e7305"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 전역 변수 (중복 선언 제거)
        let selectedItems = []; 
        const MAIN_SERIES = ["Intel Ultra 시리즈", "Intel 14세대 시리즈", "AMD 시리즈"];
        const PART_TYPES = ["CPU", "RAM", "그래픽카드", "SSD","CASE","POWER"];

        // 3. 데이터 로드 함수
        function loadParts() {
            const container = document.getElementById('categorySections');
            
            db.ref('parts').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    container.innerHTML = '<div class="p-10 text-center text-gray-400">데이터를 찾을 수 없습니다. 파이썬 스크립트를 먼저 실행해주세요.</div>';
                    return;
                }

                container.innerHTML = ''; 

                MAIN_SERIES.forEach(series => {
                    if (!data[series]) return;

                    const seriesDiv = document.createElement('div');
                    seriesDiv.className = "mb-16";
                    seriesDiv.innerHTML = `<h3 class="text-2xl font-black mb-6 border-l-4 border-blue-600 pl-3">${series}</h3>`;
                    
                    PART_TYPES.forEach(pType => {
                        const typeSection = document.createElement('div');
                        typeSection.className = "mb-8";
                        
                        const grid = document.createElement('div');
                        grid.className = "grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4";
                        
                        let hasItems = false;
                        
                        Object.keys(data[series]).forEach(safeName => {
                            const item = data[series][safeName];
                            if (item.type === pType) {
                                hasItems = true;
                                grid.innerHTML += `
                                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:border-blue-300 transition-all flex flex-col justify-between">
                                        <div>
                                            <div class="aspect-square bg-gray-50 rounded-xl mb-3 flex items-center justify-center overflow-hidden p-2">
                                                <img src="${item.image}" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                                            </div>
                                            <div class="text-[10px] text-blue-500 font-bold mb-1">${item.type}</div>
                                            <h4 class="font-bold text-xs mb-2 h-10 line-clamp-2 text-gray-700">${item.name}</h4>
                                        </div>
                                        <div>
                                            <p class="text-blue-600 font-black text-sm mb-3">${item.price.toLocaleString()}원</p>
                                            <button onclick="addItem('${safeName}', '${series}', '${item.name.replace(/'/g, "\\'")}', ${item.price})" 
                                                    class="w-full py-2 bg-gray-900 text-white rounded-lg text-xs font-bold hover:bg-blue-600 transition">추가</button>
                                        </div>
                                    </div>
                                `;
                            }
                        });

                        if (hasItems) {
                            typeSection.innerHTML = `<h4 class="text-sm font-bold text-gray-400 mb-4 ml-1">${pType} 목록</h4>`;
                            typeSection.appendChild(grid);
                            seriesDiv.appendChild(typeSection);
                        }
                    });
                    
                    container.appendChild(seriesDiv);
                });
            });
        }

        // 4. 선택 및 계산 함수
        function addItem(id, cat, name, price) {
            const existIndex = selectedItems.findIndex(item => item.id === id);
            if (existIndex > -1) {
                selectedItems[existIndex].quantity += 1;
            } else {
                selectedItems.push({ id, cat, name, price, quantity: 1 });
            }
            updateUI();
        }

        function updateQuantity(index, delta) {
            selectedItems[index].quantity += delta;
            if (selectedItems[index].quantity <= 0) {
                selectedItems.splice(index, 1);
            }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('selectedList');
            const totalDisplay = document.getElementById('totalDisplay');
            const itemCount = document.getElementById('itemCount');
            const isAssembled = document.getElementById('assemblyOption').checked;
            
            if (selectedItems.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>';
            } else {
                list.innerHTML = selectedItems.map((item, index) => `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex-1 pr-2">
                                <p class="text-[9px] font-bold text-blue-500">${item.cat}</p>
                                <p class="text-xs font-bold text-gray-800 truncate">${item.name}</p>
                            </div>
                            <button onclick="updateQuantity(${index}, -${item.quantity})" class="text-gray-300 hover:text-red-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <div class="flex items-center border rounded-lg bg-white">
                                <button onclick="updateQuantity(${index}, -1)" class="px-2 py-1 text-gray-500 hover:bg-gray-100">-</button>
                                <span class="px-3 text-xs font-bold border-x">${item.quantity}</span>
                                <button onclick="updateQuantity(${index}, 1)" class="px-2 py-1 text-gray-500 hover:bg-gray-100">+</button>
                            </div>
                            <p class="text-xs font-black text-gray-900">${(item.price * item.quantity).toLocaleString()}원</p>
                        </div>
                    </div>
                `).join('');
            }

            let subtotal = selectedItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            if (isAssembled && selectedItems.length > 0) subtotal += 100000;

            totalDisplay.innerText = `${subtotal.toLocaleString()}원`;
            itemCount.innerText = `${selectedItems.length}종`;
        }

// 4. 모달 및 폼 제출 로직 (기존 로직 보완)
        function openConsultModal() {
            if (selectedItems.length === 0) {
                alert("부품을 먼저 선택해주세요.");
                return;
            }
            // 현재 화면의 합계를 모달에 반영
            document.getElementById('modalTotalPrice').innerText = document.getElementById('totalDisplay').innerText;
            document.getElementById('consultModal').classList.remove('hidden');
            document.getElementById('consultModal').classList.add('flex');
        }

        function closeConsultModal() {
            document.getElementById('consultModal').classList.remove('flex');
            document.getElementById('consultModal').classList.add('hidden');
        }

        document.getElementById('consultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const requestData = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                memo: document.getElementById('userMemo').value,
                items: selectedItems, // 선택된 부품 목록 전체
                totalPrice: document.getElementById('totalDisplay').innerText,
                type: "견적 상담 신청",
                timestamp: Date.now()
            };

            // Firebase의 'requests' 노드에 저장
            db.ref('requests').push(requestData, (error) => {
                if (!error) {
                    alert('견적 상담 신청이 완료되었습니다. 확인 후 연락드리겠습니다!');
                    location.reload(); // 성공 후 페이지 새로고침
                } else {
                    alert('오류가 발생했습니다: ' + error.message);
                }
            });
        });

        // 페이지 로드 시 실행
        window.onload = function() {
            loadParts();
        };
    </script>
</body>
</html>
