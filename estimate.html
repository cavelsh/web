<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 견적 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sticky-summary { position: sticky; top: 5rem; }
        /* 이미지 로딩 애니메이션 */
        .loading-skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">COMPATCH</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="#" class="text-blue-600">실시간 견적</a>
                <a href="trade-in.html">중고 매입</a>
                <a href="archive.html">자료실</a>
            </div>
            <button class="text-sm font-bold text-gray-500">문의하기</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="flex-1">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-black tracking-tight">부품 선택 <span class="text-blue-600 text-sm ml-2" id="lastUpdateText">네이버 실시간 시세 반영 중</span></h2>
                </div>

                <div id="partsContainer" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="p-10 text-center col-span-full text-gray-400">데이터를 불러오고 있습니다...</div>
                </div>
            </div>

            <div class="w-full lg:w-96">
                <div class="sticky-summary bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
                    <div class="p-6 bg-gray-900 text-white">
                        <h3 class="text-lg font-bold">견적 합계</h3>
                        <p class="text-3xl font-black text-blue-400 mt-2" id="totalDisplay">0원</p>
                    </div>
                    
                    <div class="p-6">
                        <div id="selectedList" class="space-y-4 mb-6 min-h-[200px]">
                            <p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>
                        </div>
                        
                        <div class="border-t border-dashed pt-6 space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">부품 수</span>
                                <span class="font-bold" id="itemCount">0개</span>
                            </div>
                        </div>

                        <button onclick="openConsultModal()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                            상담 신청하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="consultModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50">
                <h3 class="font-black text-xl">상담 신청</h3>
                <button onclick="closeConsultModal()" class="text-2xl text-gray-400 hover:text-gray-900">&times;</button>
            </div>
            <form id="consultForm" class="p-6 space-y-4">
                <input type="text" id="userName" required class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500" placeholder="성함">
                <input type="tel" id="userPhone" required class="w-full border rounded-lg px-4 py-3 outline-none focus:border-blue-500" placeholder="연락처">
                <textarea id="userMemo" class="w-full border rounded-lg px-4 py-3 h-24 outline-none focus:border-blue-500" placeholder="추가 요청사항 (배송 등)"></textarea>
                <div class="bg-blue-50 p-4 rounded-xl">
                    <p class="text-xs text-blue-500 font-bold">최종 신청 금액</p>
                    <p id="modalTotalPrice" class="text-xl font-black text-blue-600">0원</p>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">신청 완료</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase 설정 (사용자 프로젝트 정보)
        const firebaseConfig = {
            apiKey: "AIzaSyB...", // 본인의 키로 자동 적용됨
            authDomain: "compatch-e7305.firebaseapp.com",
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "compatch-e7305",
            storageBucket: "compatch-e7305.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedItems = [];

        // 2. Firebase에서 네이버 시세 데이터 실시간 로드 및 카드 생성
        function loadParts() {
            const container = document.getElementById('partsContainer');
            
            db.ref('parts').on('value', (snapshot) => {
                const categories = snapshot.val();
                if (!categories) {
                    container.innerHTML = '<div class="p-10 text-center col-span-full text-gray-400">등록된 부품 데이터가 없습니다.</div>';
                    return;
                }

                container.innerHTML = ''; // 초기화

                Object.keys(categories).forEach(cat => {
                    const items = categories[cat];
                    Object.keys(items).forEach(id => {
                        const item = items[id];
                        
                        // HTML 카드 생성 (네이버 API로 가져온 이미지와 가격 반영)
                        const card = `
                            <div class="group bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all cursor-pointer flex flex-col">
                                <div class="aspect-square bg-gray-50 rounded-xl mb-4 flex items-center justify-center overflow-hidden">
                                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain group-hover:scale-110 transition duration-300">
                                </div>
                                <div class="inline-block self-start px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-md mb-2 uppercase">${cat}</div>
                                <h3 class="font-bold text-gray-900 text-sm mb-1 line-clamp-2 h-10">${item.name}</h3>
                                <p class="text-blue-600 font-black text-lg mt-auto">${item.price.toLocaleString()}원</p>
                                <button onclick="addItem('${id}', '${cat}', '${item.name}', ${item.price})" 
                                        class="w-full mt-4 py-3 bg-gray-900 text-white rounded-xl font-bold text-xs group-hover:bg-blue-600 transition">
                                    추가하기
                                </button>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                });
            });
        }

        // 3. 부품 추가 및 견적 계산 로직
        function addItem(id, cat, name, price) {
            selectedItems.push({ id, cat, name, price });
            updateUI();
        }

        function removeItem(index) {
            selectedItems.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('selectedList');
            const totalDisplay = document.getElementById('totalDisplay');
            const itemCount = document.getElementById('itemCount');
            
            if (selectedItems.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-sm text-center py-10">선택된 부품이 없습니다.</p>';
            } else {
                list.innerHTML = selectedItems.map((item, index) => `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100 animate-in slide-in-from-right-2 duration-200">
                        <div class="flex-1 min-w-0 mr-4">
                            <p class="text-[10px] font-bold text-blue-500 uppercase">${item.cat}</p>
                            <p class="text-xs font-bold text-gray-800 truncate">${item.name}</p>
                            <p class="text-xs text-gray-500">${item.price.toLocaleString()}원</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                `).join('');
            }

            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            totalDisplay.innerText = `${total.toLocaleString()}원`;
            itemCount.innerText = `${selectedItems.length}개`;
        }

        // 4. 모달 및 폼 제출
        function openConsultModal() {
            if (selectedItems.length === 0) return alert("부품을 먼저 선택해주세요.");
            document.getElementById('modalTotalPrice').innerText = document.getElementById('totalDisplay').innerText;
            document.getElementById('consultModal').classList.remove('hidden');
            document.getElementById('consultModal').classList.add('flex');
        }

        function closeConsultModal() {
            document.getElementById('consultModal').classList.remove('flex');
            document.getElementById('consultModal').classList.add('hidden');
        }

        document.getElementById('consultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const requestData = {
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                memo: document.getElementById('userMemo').value,
                items: selectedItems,
                totalPrice: document.getElementById('totalDisplay').innerText,
                type: "상담 신청",
                timestamp: Date.now()
            };

            db.ref('requests').push(requestData, (error) => {
                if (!error) {
                    alert('견적 상담 신청이 완료되었습니다. 확인 후 연락드리겠습니다.');
                    location.reload();
                }
            });
        });

        // 초기 실행
        window.onload = loadParts;
    </script>
</body>
</html>
