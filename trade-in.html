<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 판매 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="index.html" class="text-blue-600">메인으로</a>
               <a href="estimate.html">실시간 견적</a>
                <a href="trade-in.html" class="text-blue-600">중고 판매</a>
                <a href="archive.html">자료실</a>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-gray-100 py-20 text-center">
        <h1 class="text-5xl font-black tracking-tighter mb-4">중고 보유 상품 안내</h1>
        <p class="text-gray-400 font-medium">관리자가 직접 검수하고 올린 믿을 수 있는 중고 제품</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-16">
        <div id="usedProductGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20 text-gray-400">상품을 불러오는 중입니다...</div>
        </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

function loadUsedProducts() {
    // [중요] 'products'가 아닌 'used_db' 경로를 바라보도록 수정
    db.ref('used_db').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('usedProductContainer');
        
        if(!data) {
            container.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-bold">현재 판매 중인 중고 상품이 없습니다.</p>';
            return;
        }

        const keys = Object.keys(data).reverse();
        container.innerHTML = keys.map(key => {
            const item = data[key];
            return `
                <div class="bg-white rounded-[40px] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
                    <div class="aspect-video overflow-hidden bg-gray-100">
                        <img src="${item.image || item.img}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-8">
                        <h3 class="font-black text-xl mb-2 text-gray-800 truncate">${item.name}</h3>
                        <p class="text-2xl font-black text-blue-600 mb-8">${(item.price || 0).toLocaleString()}원</p>
                        <button onclick="applyPurchase('${item.name}', ${item.price})" 
                                class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black hover:bg-blue-600 transition shadow-lg shadow-gray-200 hover:shadow-blue-200">
                            구매 상담 신청
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    });
}
        function applyPurchase(itemName, itemPrice) {
            const name = prompt("고객님의 성함을 입력해주세요.");
            if(!name) return;
            const phone = prompt("연락처를 입력해주세요. (예: 010-1234-5678)");
            if(!phone) return;

            const requestData = {
                type: "중고 구매 신청",
                name: name,
                phone: phone,
                appliedItem: itemName,
                expectedPrice: itemPrice,
                timestamp: Date.now()
            };

            db.ref('requests').push(requestData).then(() => {
                alert(`${itemName} 구매 상담이 신청되었습니다. 담당자가 연락드리겠습니다!`);
            });
        }

        window.onload = loadUsedProducts;
    </script>
</body>
</html>
