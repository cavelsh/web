<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 매입 신청 | Compatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">COMPATCH</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="estimate.html">실시간 견적</a>
                <a href="#" class="text-blue-600">중고 매입</a>
                <a href="#">자료실</a>
            </div>
            <button class="text-sm font-bold text-gray-500">문의하기</button>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-800 mb-2">내 컴퓨터 매입 시세 확인</h2>
            <p class="text-gray-500">간단한 사양 입력으로 즉시 예상 매입가를 확인하세요.</p>
        </div>

        <form id="tradeInForm" class="space-y-8 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            
            <div>
                <label class="block text-sm font-bold mb-4">1. 기기 종류</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="device_type" value="desktop" class="hidden peer" checked>
                        <div class="p-4 border rounded-xl text-center peer-checked:border-blue-600 peer-checked:bg-blue-50 hover:bg-gray-50 transition">
                            <span class="text-2xl block mb-1">🖥️</span> 데스크탑
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="device_type" value="laptop" class="hidden peer">
                        <div class="p-4 border rounded-xl text-center peer-checked:border-blue-600 peer-checked:bg-blue-50 hover:bg-gray-50 transition">
                            <span class="text-2xl block mb-1">💻</span> 노트북
                        </div>
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <label class="block text-sm font-bold mb-2">2. 주요 사양 정보</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="cpu_spec" class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        <option value="0">CPU 선택</option>
                        <option value="150000">인텔 i7 13세대 이상</option>
                        <option value="100000">인텔 i5 13세대 이상</option>
                        <option value="80000">라이젠 5 4세대 이상</option>
                        <option value="30000">기타 구형 사양</option>
                    </select>
                    <select id="gpu_spec" class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        <option value="0">그래픽카드 선택</option>
                        <option value="400000">RTX 40 시리즈</option>
                        <option value="250000">RTX 30 시리즈</option>
                        <option value="100000">RTX 20 시리즈</option>
                        <option value="0">내장 그래픽</option>
                    </select>
                </div>
                <input type="text" placeholder="기타 상세 모델명 (예: 삼성 오디세이 G5)" class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            </div>

            <div>
                <label class="block text-sm font-bold mb-4">3. 제품 상태</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="condition" value="1.0" class="hidden peer" checked>
                        <div class="py-3 border rounded-xl text-center text-sm peer-checked:border-blue-600 peer-checked:text-blue-600 transition">S급 (풀박스)</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="condition" value="0.9" class="hidden peer">
                        <div class="py-3 border rounded-xl text-center text-sm peer-checked:border-blue-600 peer-checked:text-blue-600 transition">A급 (깨끗함)</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="condition" value="0.7" class="hidden peer">
                        <div class="py-3 border rounded-xl text-center text-sm peer-checked:border-blue-600 peer-checked:text-blue-600 transition">B급 (사용감)</div>
                    </label>
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl p-6 text-center text-white">
                <p class="text-slate-400 text-sm mb-2">현재 조건 기준 예상 매입가</p>
                <h3 id="estimatedPrice" class="text-3xl font-black text-blue-400">0원</h3>
                <p class="text-[10px] text-slate-500 mt-4">* 실제 검수 후 금액이 변동될 수 있습니다.</p>
            </div>

            <div class="pt-6 border-t space-y-4">
                <input type="text" placeholder="신청자 성함" required class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="tel" placeholder="연락처 (010-0000-0000)" required class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-600/20">
                    매입 신청하기
                </button>
            </div>

        </form>
    </div>

    <script>
        const cpuSelect = document.getElementById('cpu_spec');
        const gpuSelect = document.getElementById('gpu_spec');
        const priceDisplay = document.getElementById('estimatedPrice');
        const conditionRadios = document.getElementsByName('condition');

        function calculatePrice() {
            const cpuPrice = parseInt(cpuSelect.value);
            const gpuPrice = parseInt(gpuSelect.value);
            
            let conditionMultiplier = 1.0;
            conditionRadios.forEach(radio => {
                if (radio.checked) conditionMultiplier = parseFloat(radio.value);
            });

            const total = Math.floor((cpuPrice + gpuPrice) * conditionMultiplier);
            priceDisplay.innerText = total > 0 ? total.toLocaleString() + '원' : '0원';
        }

        // 이벤트 리스너 등록
        cpuSelect.addEventListener('change', calculatePrice);
        gpuSelect.addEventListener('change', calculatePrice);
        conditionRadios.forEach(radio => radio.addEventListener('change', calculatePrice));

// 중고 매입 폼 제출 이벤트 내부 수정
document.getElementById('tradeInForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const tradeInData = {
        name: e.target.querySelector('input[placeholder="신청자 성함"]').value,
        phone: e.target.querySelector('input[placeholder="연락처 (010-0000-0000)"]').value,
        device: e.target.querySelector('input[name="device_type"]:checked').value,
        price: document.getElementById('estimatedPrice').innerText,
        type: "매입 신청",
        timestamp: Date.now()
    };

    db.ref('requests').push(tradeInData, (error) => {
        if (!error) {
            alert('매입 신청이 성공적으로 접수되었습니다!');
            location.href = "index.html";
        }
    });
});

    </script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>
</body>
</html>
