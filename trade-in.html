<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 판매 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-blue-600">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="index.html" class="hover:text-blue-600">메인으로</a>
                <a href="estimate.html" class="hover:text-blue-600">실시간 견적</a>
                <a href="trade-in.html" class="text-blue-600">중고 판매</a>
                <a href="archive.html" class="hover:text-blue-600">자료실</a>
                <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
         </div>
        </div>
    </nav>

    <header class="py-16 px-4 bg-white border-b border-gray-50">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-4">USED PRODUCTS</h1>
            <p class="text-gray-400 font-medium">관리자가 엄선한 중고 완본체 및 부품 리스트입니다.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="usedProductContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20 text-gray-400 animate-pulse">중고 상품을 불러오는 중입니다...</p>
        </div>
    </main>

    <script>
        // 1. Firebase 설정 (관리자 페이지와 반드시 동일해야 함)
        const firebaseConfig = {
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 중고 상품 불러오기 함수
        function loadUsedProducts() {
            // 관리자가 등록한 'used_db' 노드를 실시간 감시
            db.ref('used_db').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('usedProductContainer');
                
                if(!data) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-gray-400 font-bold text-lg">현재 판매 중인 중고 상품이 없습니다.</p>
                        </div>`;
                    return;
                }

                const keys = Object.keys(data).reverse(); // 최신순 정렬
                container.innerHTML = keys.map(key => {
                    const item = data[key];
                    // 이미지 주소가 없을 경우 대비
                    const itemImg = item.image || 'https://via.placeholder.com/400x300?text=No+Image';
                    
                    return `
                        <div class="bg-white rounded-[40px] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
                            <div class="aspect-video overflow-hidden bg-gray-100">
                                <img src="${itemImg}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            </div>
                            <div class="p-8">
                                <div class="mb-4">
                                    <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase tracking-widest">Premium Used</span>
                                </div>
                                <h3 class="font-black text-xl mb-2 text-gray-800 truncate">${item.name}</h3>
                                <p class="text-2xl font-black text-blue-600 mb-8">${Number(item.price).toLocaleString()}원</p>
                                <button onclick="applyPurchase('${item.name}', ${item.price})" 
                                        class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black hover:bg-blue-600 transition shadow-lg">
                                    구매 상담 신청
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // 3. 구매 신청 함수
        function applyPurchase(itemName, itemPrice) {
            const userName = prompt("성함을 입력해주세요.");
            if(!userName) return;
            const userPhone = prompt("연락처를 입력해주세요. (예: 010-1234-5678)");
            if(!userPhone) return;

            const requestData = {
                type: "중고 구매 신청",
                name: userName,
                phone: userPhone,
                appliedItem: itemName,
                expectedPrice: itemPrice,
                timestamp: Date.now()
            };

            db.ref('requests').push(requestData).then(() => {
                alert(`[${itemName}] 구매 상담이 신청되었습니다.\n담당자가 확인 후 연락드리겠습니다!`);
            });
        }

        // 페이지 로드 시 실행
        window.onload = loadUsedProducts;
    </script>
</body>
</html>
