<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 판매 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-start gap-10">
            <a href="index.html" class="text-xl font-black text-blue-600">Well Design</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold">
                <a href="index.html" class="hover:text-blue-600">메인으로</a>
                <a href="estimate.html" class="hover:text-blue-600">컴퓨터 견적내기</a>
                <a href="trade-in.html" class="text-blue-600">중고 판매</a>
                <a href="archive.html" class="hover:text-blue-600">자료실</a>
                 <a href="qna.html" class="hover:text-blue-600">질문과 답변</a>
                <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
            </div>
        </div>
    </nav>

    <header class="py-16 px-4 bg-white border-b border-gray-50">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-4 uppercase">중고 상품 안내</h1>
            <p class="text-gray-400 font-medium">관리자가 인증한 중고 상품 리스트입니다.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="usedProductContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20 text-gray-400 font-bold">상품 정보를 불러오는 중입니다...</p>
        </div>
    </main>

    <script>
        // Firebase 설정
        const firebaseConfig = {
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        
        // 초기화 확인 후 앱 시작
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 중고 상품 목록 로드 함수
        function loadUsedProducts() {
            // 'used_db' 경로에서 데이터를 실시간으로 가져옴
            db.ref('used_db').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('usedProductContainer');
                
                if(!data) {
                    container.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-bold">등록된 중고 상품이 없습니다.</p>';
                    return;
                }

                const keys = Object.keys(data).reverse();
                container.innerHTML = keys.map(key => {
                    const item = data[key];
                    return `
                        <div class="bg-white rounded-[40px] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
                            <div class="aspect-video overflow-hidden bg-gray-100">
                                <img src="${item.image || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                                     alt="${item.name}" 
                                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            </div>
                            <div class="p-8">
                                <h3 class="font-black text-xl mb-3 text-gray-800 leading-tight whitespace-normal break-all">
                                    ${item.name}
                                </h3>
                                
                                <p class="text-sm text-gray-500 mb-6 leading-relaxed min-h-[3rem]">
                                    ${item.description || "상세 설명이 없습니다."}
                                </p>

                                <div class="flex justify-between items-end mb-8">
                                    <div>
                                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Selling Price</p>
                                        <p class="text-3xl font-black text-blue-600">${Number(item.price).toLocaleString()}원</p>
                                    </div>
                                </div>

                                <button onclick="applyPurchase('${item.name.replace(/'/g, "\\'")}', ${item.price})" 
                                        class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black hover:bg-blue-600 transition shadow-lg active:scale-[0.98]">
                                    구매 상담 신청
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }, (error) => {
                console.error("데이터 로드 중 오류 발생:", error);
                document.getElementById('usedProductContainer').innerHTML = 
                    `<p class="col-span-full text-center py-20 text-red-500 font-bold">데이터를 불러오지 못했습니다. (권한 오류 등)</p>`;
            });
        }

        // 구매 상담 신청 함수
        function applyPurchase(itemName, itemPrice) {
            const name = prompt("성함을 입력해주세요.");
            if(!name) return;
            const phone = prompt("연락처를 입력해주세요.");
            if(!phone) return;

            const requestData = {
                type: "중고 구매 신청",
                name: name,
                phone: phone,
                items: {
                    "선택상품": {
                        name: itemName,
                        count: 1
                    }
                },
                totalPrice: Number(itemPrice).toLocaleString() + "원",
                timestamp: Date.now()
            };

            db.ref('requests').push(requestData).then(() => {
                alert(`[${itemName}] 상담 신청이 완료되었습니다!\n담당자가 곧 연락드리겠습니다.`);
            }).catch(err => {
                alert("신청 중 오류가 발생했습니다.");
                console.error(err);
            });
        }

        // 페이지 로드 시 실행
        window.onload = loadUsedProducts;
    </script>
</body>
</html>
