<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A 게시판 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Malgun Gothic', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design</a>
                <div class="hidden md:flex gap-6 text-sm font-bold text-gray-500 uppercase">
                    <a href="estimate.html" class="hover:text-blue-600 transition-colors">PC 견적</a>
                    <a href="trade-in.html" class="hover:text-blue-600 transition-colors">중고판매</a>
                    <a href="archive.html" class="hover:text-blue-600 transition-colors">자료실</a>
                    <a href="qna.html" class="text-blue-600">Q&A</a>
                    <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-gray-100 py-12">
        <div class="max-w-4xl mx-auto px-6 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black tracking-tight mb-2">Q&A</h1>
                <p class="text-gray-500 font-medium">궁금하신 점을 남겨주시면 정성껏 답변해 드립니다.</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                문의하기
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div id="qna-list" class="space-y-4">
            <div class="text-center py-20 text-gray-400 font-medium">문의 사항을 불러오는 중입니다...</div>
        </div>
    </main>

    <div id="qna-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] max-w-lg w-full p-8 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black mb-6">문의 작성</h2>
            <div class="space-y-4">
                <input type="text" id="qnaTitle" placeholder="제목을 입력하세요" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="qnaAuthor" placeholder="작성자" class="p-4 bg-gray-50 rounded-2xl border-none">
                    <input type="password" id="qnaPw" placeholder="비밀번호" class="p-4 bg-gray-50 rounded-2xl border-none">
                </div>
                <textarea id="qnaContent" placeholder="문의하실 내용을 상세히 적어주세요." class="w-full h-40 p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500"></textarea>
                
                <label class="flex items-center gap-3 p-2 cursor-pointer group">
                    <input type="checkbox" id="isPrivate" class="w-5 h-5 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm font-bold text-gray-600 group-hover:text-blue-600 transition-colors">비밀글로 보호하기 (나만 보기)</span>
                </label>
            </div>
            
            <div class="flex gap-3 mt-8">
                <button onclick="submitQnA()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">등록하기</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all">취소</button>
            </div>
        </div>
    </div>

    <div id="password-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-xs w-full p-6 text-center">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h3 class="font-bold mb-2">비밀글 보호</h3>
            <p class="text-xs text-gray-500 mb-4">작성 시 설정한 비밀번호를 입력하세요.</p>
            <input type="password" id="checkPw" class="w-full p-3 bg-gray-50 rounded-xl border-none mb-4 text-center focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button id="pwConfirmBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">확인</button>
                <button onclick="closePwModal()" class="flex-1 bg-gray-100 text-gray-500 py-3 rounded-xl font-bold text-sm">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Firebase 설정 (기존 설정값 유지)
        const firebaseConfig = {
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 모달 제어
        function openModal() { document.getElementById('qna-modal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('qna-modal').classList.replace('flex', 'hidden'); }
        function closePwModal() { document.getElementById('password-modal').classList.replace('flex', 'hidden'); }

        // 2. 글 등록 및 관리자 알림
        function submitQnA() {
            const title = document.getElementById('qnaTitle').value;
            const author = document.getElementById('qnaAuthor').value;
            const pw = document.getElementById('qnaPw').value;
            const content = document.getElementById('qnaContent').value;
            const isPrivate = document.getElementById('isPrivate').checked;

            if(!title || !author || !pw || !content) return alert("모든 항목을 입력해주세요.");

            const qnaData = {
                title, author, pw, content, isPrivate,
                status: "waiting",
                answer: "",
                timestamp: Date.now()
            };

            db.ref('qna').push(qnaData).then(() => {
                alert("문의가 등록되었습니다. 확인 후 답변드리겠습니다.");
                location.reload();
            });
        }

        // 3. 목록 불러오기
        function loadQnAList() {
            db.ref('qna').orderByChild('timestamp').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('qna-list');
                if(!data) {
                    container.innerHTML = '<div class="text-center py-20 text-gray-400 font-medium">등록된 문의가 없습니다.</div>';
                    return;
                }

                let html = "";
                const keys = Object.keys(data).reverse(); // 최신순

                keys.forEach(id => {
                    const item = data[id];
                    const date = new Date(item.timestamp).toLocaleDateString();
                    const isCompleted = item.status === 'completed';
                    
                    html += `
                        <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-all">
                            <div onclick="toggleContent('${id}', ${item.isPrivate})" class="p-6 cursor-pointer flex items-center justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[10px] font-black px-2 py-1 rounded-full uppercase ${isCompleted ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                                            ${isCompleted ? '답변완료' : '답변대기'}
                                        </span>
                                        ${item.isPrivate ? '<span class="text-gray-400">🔒</span>' : ''}
                                        <span class="text-xs text-gray-400 font-medium">${item.author} | ${date}</span>
                                    </div>
                                    <h3 class="font-bold text-gray-800">${item.isPrivate ? '비밀글입니다.' : item.title}</h3>
                                </div>
                                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            
                            <div id="content-${id}" class="hidden bg-gray-50 border-t border-gray-100 p-6">
                                <div class="bg-white p-5 rounded-2xl shadow-sm text-gray-700 leading-relaxed whitespace-pre-wrap mb-4">
                                    <div class="text-xs font-bold text-blue-600 mb-2">Q. 문의내용</div>
                                    ${item.content}
                                </div>
                                ${isCompleted ? `
                                    <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-gray-700 leading-relaxed whitespace-pre-wrap">
                                        <div class="text-xs font-bold text-blue-600 mb-2">A. 웰디자인 답변</div>
                                        ${item.answer}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        // 4. 비밀글 확인 로직
        function toggleContent(id, isPrivate) {
            const contentDiv = document.getElementById(`content-${id}`);
            
            // 이미 열려있으면 닫기
            if(!contentDiv.classList.contains('hidden')) {
                contentDiv.classList.add('hidden');
                return;
            }

            if(isPrivate) {
                const modal = document.getElementById('password-modal');
                const btn = document.getElementById('pwConfirmBtn');
                const input = document.getElementById('checkPw');
                
                modal.classList.replace('hidden', 'flex');
                input.value = "";
                input.focus();

                btn.onclick = () => {
                    db.ref(`qna/${id}/pw`).once('value', (snap) => {
                        if(snap.val() === input.value) {
                            closePwModal();
                            contentDiv.classList.remove('hidden');
                        } else {
                            alert("비밀번호가 일치하지 않습니다.");
                        }
                    });
                };
            } else {
                contentDiv.classList.remove('hidden');
            }
        }

        window.onload = loadQnAList;
    </script>
</body>
</html>
