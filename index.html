<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Design | PC 견적 및 컴퓨터 수리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 배경 이미지 설정 */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://r.jina.ai/i/068019688701460596328636e29780cb'); /* 생성된 이미지 링크 */
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* 꽃잎 흩날리는 애니메이션 */
        @keyframes petalFall {
            0% { opacity: 0; transform: translateY(-10px) translateX(0) rotate(0deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(100vh) translateX(100px) rotate(720deg); }
        }
        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 50% 0 50% 50%;
            animation: petalFall 10s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        /* 유리 질감 효과 (Glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="text-gray-900">

    <div class="hero-bg"></div>
    <div id="petal-container"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-5xl mx-auto glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-lg">
            <a href="index.html" class="text-xl font-black text-blue-600 tracking-tighter">Well Design</a>
            <div class="flex gap-6 text-sm font-bold">
                <a href="trade-in.html" class="hover:text-blue-500">중고장터</a>
                <a href="estimate.html" class="hover:text-blue-500">견적내기</a>
                <a href="qna.html" class="hover:text-blue-500">상담 문의및 답변</a>
                <a href="archive.html" class="hover:text-blue-500">자료실</a>
                <a href="admin-list.html" class="text-gray-400 hover:text-blue-500">관리자</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center pt-20 px-6">
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-black text-white drop-shadow-2xl mb-4 tracking-tighter">
                Smart PC Solution
            </h1>
            <p class="text-lg md:text-xl font-bold text-white drop-shadow-lg">
                정직한 견적, 신속한 수리, 최고의 만족을 약속합니다.
            </p>
        </div>

        <div class="glass p-8 rounded-[40px] shadow-2xl max-w-sm w-full text-center transform hover:scale-105 transition-all duration-500">
            <div class="mb-6">
                <p class="text-blue-600 font-black text-xs uppercase tracking-widest mb-2">Technical Specialist</p>
                <h2 class="text-3xl font-black text-gray-900 mb-1">Lee Sang Ho</h2>
                <p class="text-gray-500 font-bold">010-9590-9782</p>
            </div>
            
            <div class="bg-white p-4 rounded-3xl shadow-inner mb-6 inline-block">
                <div id="qr-code-placeholder" onclick="toggleQR()" class="cursor-pointer">
                    <img id="qrImg" src="" alt="명함 QR" class="w-40 h-40">
                </div>
            </div>

            <button onclick="toggleQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-200 transition-all">
                연락처 저장하기 (QR)
            </button>
        </div>

        <div class="mt-12 flex gap-4">
            <a href="estimate.html" class="glass px-8 py-4 rounded-2xl font-black text-blue-600 hover:bg-white transition-all shadow-md">
                지금 견적내기 →
            </a>
        </div>
    </main>

    <script>
        // 1. 꽃잎 생성 스크립트
        function createPetals() {
            const container = document.getElementById('petal-container');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 15 + 10 + 'px';
                petal.style.height = petal.style.width;
                petal.style.animationDelay = Math.random() * 10 + 's';
                petal.style.animationDuration = Math.random() * 5 + 7 + 's';
                container.appendChild(petal);
            }
        }

        // 2. QR 코드 생성 (기존 로직 유지)
        function generateQR() {
            const vCardData = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "FN:이상호 (컴퓨터 수리)",
                "ORG:웰디자인",
                "TEL;TYPE=CELL:010-9590-9782",
                "EMAIL:cavelsh@gmail.com",
                "END:VCARD"
            ].join("\n");
            
            const qrSource = `https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=${encodeURIComponent(vCardData)}&choe=UTF-8`;
            document.getElementById('qrImg').src = qrSource;
        }

        function toggleQR() {
            alert("QR 코드를 스캔하면 연락처를 바로 저장할 수 있습니다.");
        }

        window.onload = () => {
            createPetals();
            generateQR();
        };
    </script>
</body>
</html>
