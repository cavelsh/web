    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* === 계절별 애니메이션 === */
        @keyframes petalFall {
            0% { opacity: 0; transform: translateY(-10px) rotate(0deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
        .petal { position: absolute; background-color: #ffb7c5; border-radius: 50% 0 50% 50%; animation: petalFall 10s linear infinite; pointer-events: none; }

        @keyframes summerHeat { 0%, 100% { filter: saturate(1.1) brightness(1); } 50% { filter: saturate(1.3) brightness(1.1); } }
        .summer-effect { animation: summerHeat 4s ease-in-out infinite; }

        @keyframes leafFall {
            0% { opacity: 0; transform: translateY(-10px) rotate(0deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
        }
        .leaf { position: absolute; animation: leafFall 8s linear infinite; pointer-events: none; border-radius: 2px; }

        @keyframes snowFall {
            0% { opacity: 0; transform: translateY(-10px); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(100vh); }
        }
        .snow { position: absolute; background-color: #fff; border-radius: 50%; animation: snowFall 5s linear infinite; pointer-events: none; }
    </style>
</head>

    <script>
        function setSeasonParams() {
            const month = new Date().getMonth() + 1;
            const header = document.getElementById('seasonHeader');
            const effectLayer = document.getElementById('seasonEffectLayer');
            
            let bgUrl = '';
            let effectType = '';
            let effectCount = 0;

            if (month >= 3 && month <= 5) {
                bgUrl = 'https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1920';
                effectType = 'petal'; effectCount = 40;
            } else if (month >= 6 && month <= 8) {
                bgUrl = 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920';
                header.classList.add('summer-effect');
            } else if (month >= 9 && month <= 11) {
                bgUrl = 'https://images.unsplash.com/photo-1503718134758-a141914aee92?q=80&w=1920';
                effectType = 'leaf'; effectCount = 25;
            } else {
                bgUrl = 'https://images.unsplash.com/photo-1418985991508-e473b644948a?q=80&w=1920';
                effectType = 'snow'; effectCount = 60;
            }

            header.style.backgroundImage = `url('${bgUrl}')`;

            if (effectCount > 0) {
                for (let i = 0; i < effectCount; i++) {
                    const el = document.createElement('div');
                    el.classList.add(effectType);
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.animationDelay = Math.random() * 10 + 's';
                    el.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    const size = (Math.random() * 10 + 5) + 'px';
                    el.style.width = size; el.style.height = size;
                    if(effectType === 'leaf') el.style.backgroundColor = ['#d35400', '#e67e22'][Math.floor(Math.random()*2)];
                    effectLayer.appendChild(el);
                }
            }
        }
        window.onload = setSeasonParams;
    </script>
