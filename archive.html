<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실 | Well Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="index.html" class="text-2xl font-black text-blue-600 tracking-tighter">Well Design</a>
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-600">
                    <a href="index.html" class="text-blue-600">메인으로</a>
                    <a href="estimate.html" class="hover:text-blue-600">컴퓨터 견적내기</a>
                    <a href="trade-in.html" class="hover:text-blue-600">중고 판매</a>
                    <a href="archive.html" class="hover:text-blue-600">자료실</a>
                    <a href="qna.html" class="hover:text-blue-600">질문과 답변</a>
                    <a href="admin-list.html" class="hover:text-blue-600">관리자</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-4 py-16">
        <h1 class="text-4xl font-black mb-4">자료실</h1>
        <p class="text-gray-500 font-medium">드라이버, 매뉴얼 등 필요한 자료를 다운로드하세요.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-5 text-sm font-bold text-gray-400 uppercase">구분</th>
                        <th class="p-5 text-sm font-bold text-gray-400 uppercase">자료명</th>
                        <th class="p-5 text-sm font-bold text-gray-400 uppercase text-center">등록일</th>
                        <th class="p-5 text-sm font-bold text-gray-400 uppercase text-right">다운로드</th>
                    </tr>
                </thead>
                <tbody id="archiveBody" class="divide-y divide-gray-50">
                    <tr>
                        <td colspan="4" class="p-20 text-center text-gray-400">자료를 불러오는 중입니다...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // 1. Firebase 설정 (관리자 페이지와 동일하게 설정)
        const firebaseConfig = { 
            databaseURL: "https://compatch-e7305-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 자료실 데이터 로드 함수
        function loadArchives() {
            const archiveBody = document.getElementById('archiveBody');
            
            db.ref('archives').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    archiveBody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-gray-400 font-medium">등록된 자료가 없습니다.</td></tr>';
                    return;
                }

                const html = Object.keys(data).reverse().map(key => {
                    const item = data[key];
                    // 카테고리별 색상 구분
                    let colorClass = "bg-gray-100 text-gray-600";
                    if(item.category === '드라이버') colorClass = "bg-blue-50 text-blue-600";
                    if(item.category === '매뉴얼') colorClass = "bg-orange-50 text-orange-600";
                    if(item.category === 'BIOS') colorClass = "bg-purple-50 text-purple-600";

                    return `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="p-5">
                                <span class="${colorClass} px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">
                                    ${item.category}
                                </span>
                            </td>
                            <td class="p-5">
                                <div class="font-bold text-gray-800">${item.title}</div>
                            </td>
                            <td class="p-5 text-center text-sm text-gray-400 font-medium">
                                ${item.date}
                            </td>
                            <td class="p-5 text-right">
                                <a href="${item.link}" target="_blank" class="inline-flex items-center justify-center w-10 h-10 bg-gray-900 text-white rounded-xl hover:bg-blue-600 transition-all shadow-sm">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                </a>
                            </td>
                        </tr>
                    `;
                }).join('');

                archiveBody.innerHTML = html;
            });
        }

        // 페이지 로드 시 실행
        window.onload = loadArchives;
    </script>
</body>
</html>
